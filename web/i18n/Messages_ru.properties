watch_dog_not_support_ipv6 = Функция сторожевой схемы не влияет на сеть «только ipv6»
watch_dog_note = Будьте осторожны, используя эту функцию и задавая подходящее значение. Убедитесь, что установлен действительный адрес домена, недопустимый адрес домена может привести к ненормальному перезапуску устройства.
watch_dog_note_interval_time = Устройство попытается выполнить пинг в соответствии с временным интервалом 3 раза, если он не работает, попробует снова через 2 часа
