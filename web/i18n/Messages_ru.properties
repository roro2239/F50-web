nfc_function_intro = NFC (Near Field Communication) — это международный стандарт передачи данных для бесконтактного обмена данными на короткие расстояния в несколько сантиметров. Если вы активируете функцию NFC этого маршрутизатора, вы можете указать любой SSID WLAN, с помощью которого мобильные устройства, поддерживающие функцию NFC, могут подключаться к этому SSID WLAN без необходимости ввода пароля WLAN. Например, вы можете разрешить гостям легко подключаться к гостевому Wi-Fi.
