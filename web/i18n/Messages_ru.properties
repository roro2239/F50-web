tips_title = Ячеистая сеть состоит из нескольких ячеистых устройств и обеспечивает лучший сигнал Wi-Fi. Чтобы наслаждаться лучшим опытом использования, вы можете настроить главное устройство и оконечные устройства. После подключения главного устройства к Интернету и его настройки можно нажать кнопку WPS на главном устройстве и оконечном устройстве в течение 2 минут. Оконечное устройство может автоматически искать главное устройство и подключаться к нему. Светодиод кнопки WPS не будет мигать, пока не будет развернут mesh netw ork, вы также можете настроить ячеистую сеть вручную.
