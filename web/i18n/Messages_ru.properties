privacy_policy = Политика конфиденциальности
privacy_policy_note_1 = Чтобы предоставлять вам службу обновления системы и проверять правильность функционирования ваших роутеров, требуется собирать следующие данные:
privacy_policy_note_2 = <strong>IMEI, серийный номер и версия ПО роутера.</strong>
privacy_policy_note_3 = Вы можете загрузить последнюю версию и выполнить обновление, чтобы устранить возможную опасность для системы. В то же время, можно включить функцию автообновления для устранения потенциальных критических ошибок в системе и обновления исправления уязвимости. Эта функция включена по умолчанию. Чтобы отключить ее, перейдите к расширенным настройкам и выберите >«Обновить» на нашей веб-странице управления. Кроме того, обновление версии приведет к расходу мобильного трафика.
privacy_policy_tro69_note_1 = Чтобы вы могли удаленно управлять своим мобильным широкополосным устройством с помощью CWMP (интернет - протокола), оператор будет собирать и обрабатывать некоторую личную информацию. Ваша информация контролируется и обрабатывается оператором, в то время как ZTE предоставляет только мобильные широкополосные устройства.
privacy_policy_tro69_note_2 = Для получения более подробной информации о ваших персональных данных или по любым вопросам, касающимся ваших прав как субъекта данных или обработки ваших персональных данных через оператора, свяжитесь с оператором.
privacy_policy_url = Нажимая кнопку «ПРИНЯТЬ», вы признаете, что понимаете упомянутые выше условия и принимаете их. Чтобы узнать больше о защите конфиденциальности, изучите <a href="https://www.ztedevices.com/en/Privacy-Policy/ZTESmartRouterPrivacyPolicy" target="_blank" >Политику конфиденциальности ZTE</a>.
