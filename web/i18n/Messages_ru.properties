watch_dog_info = можно ввести имя домена или IP-адрес, а затем устройство проверит этот адрес с помощью команды ping в течение «Интервала времени». Если количество неудачных попыток проверки превысит «Пороговое значение перезагрузки», устройство будет перезагружено автоматически. Учитывая, что сеть работает некорректно, устройство 3 раза попытается восстановить связь. Если они тоже окончатся неудачей, следующая проверка состоится через 2 часа.
