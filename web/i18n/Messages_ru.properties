faq_index_indicator_title = Что определяет световой индикатор?
faq_index_mesh_problem_step_1 = 1. Не удалось сформировать многосвязную сеть?
faq_index_mesh_problem_step_1_explain = Чтобы успешно создать многосвязную сеть, убедитесь, что соблюдены следующие условия:<br/>1) Два устройства не должны находиться слишком далеко друг от друга (1–3 метра). После создания многосвязной сети Wi-Fi разместите устройство в нужном месте дома. Если подустройство находится слишком далеко от основного устройства, производительность домашней многосвязной сети ухудшится.<br/>2) Новое устройство, используемое в качестве подустройства, не должно быть установлено (применимо только к заводским настройкам по умолчанию). Если устройство установлено, перед формированием многосвязной сети сбросьте его до заводских настроек.<br/>3) Нажмите кнопку WPS каждого устройства и индикатор начнет мигать.
faq_index_mesh_problem_step_2 = 2. Сколько времени занимает формирование многосвязной сети? Как узнать, что многосвязная сеть успешно сформирована?
faq_index_mesh_problem_step_2_explain = Это может занять от 2 до 3 минут, в течение которых индикатор устройства продолжает мигать белым цветом. Когда устройство находится в многосвязной сети, его индикатор сети загорится обычным образом; вы также можете просматривать многосвязные устройства в <a href="#mesh_building">топологическом представлении</a> на соответствующем экране.
faq_index_mesh_problem_step_3 = 3. Два многосвязных устройства находятся далеко друг от друга?
faq_index_mesh_problem_step_3_explain = Попробуйте любой из следующих методов:<br/>1) Добавьте больше многосвязных устройств для формирования многосвязной сети (необходимо приобрести дополнительные устройства).<br/>2) Если в многосвязной сети больше нет устройств, можно использовать сетевой кабель для подключения порта LAN основного многосвязного устройства и любого сетевого порта подустройства для обеспечения стабильной передачи данных между двумя устройствами.
faq_index_mesh_problem_step_4 = 4. Что мы должны сделать в следующих случаях после успешного установления связей?
faq_index_mesh_problem_step_4_explain = 1) Если расстояние между двумя устройствами слишком близко, после формирования многосвязной сети между ними могут возникать помехи. В этом случае разместите подустройство как минимум на расстоянии одного метра от основного устройства.<br/>2) После формирования многосвязной сети, если подустройство находится за пределами многосвязной сети, вы не можете получить доступ к сети. Чтобы использовать устройство, добавьте его в существующую многосвязную сеть еще раз или сбросьте к заводским настройкам по умолчанию, а затем сформируйте другую многосвязную сеть.<br/>3) При образовании многосвязной сети устройства в многосвязной сети имеют одинаковые параметры Wi-Fi, а устройства Wi-Fi в вашем доме подключаются к соседнему многосвязному устройству. В случае сбоя подустройства и красного цвета его индикатор будет недоступен Wi-Fi подустройства, а устройства Wi-Fi у вас дома подключатся к другому доступному многосвязному устройству поблизости. Рекомендуется устранить проблему с подключением к Wi-Fi подустройства, которая влияет на работу домашней сети Wi-Fi. Проверьте свою сеть, выполнив следующие действия:<br/>1. Проверьте подключение сетевого кабеля маршрутизатора.<br/>2. Проверьте сетевые параметры устройства в разделе <a href="#internet_setting">Настройки подключения</a>.
