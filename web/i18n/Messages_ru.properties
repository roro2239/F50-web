mesh_network_abnormal_wifi_set_confirm = Сеть Wi-Fi создана, если некоторые из подузлов находятся в автономном режиме, изменение параметров не будет синхронизировано, и когда автономный узел находится в сети, вы можете нажать WPS, чтобы повторно добавить подузл в ячеистую сеть.  Продолжать?
