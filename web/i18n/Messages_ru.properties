key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Политика конфиденциальности плана улучшения послепродажного обслуживания маршрутизатора ZTE Smart</a>.
key_log_setting_note_6 = Для улучшения качества услуг и опыта мы рекомендуем вам присоединиться к этому плану послепродажного улучшения.
key_log_switch_note_1 = Чтобы лучше определить возможные проблемы вашего маршрутизатора и обеспечить его нормальную и стабильную работу, мы соберем некоторые ключевые журналы вашего устройства, такие как: включение и отключение WiFi, успешная регистрация, уровень сигнала, изменение типа сети, передача CELL, сброс сети, подключение и отключение PDP, ненормальная работа WiFi, перезапуск, начало и конец действия FOTA, подключение сетевого кабеля. <br/>Эта информация будет экспортирована, когда ваше устройство будет отправлено в центр послепродажного обслуживания, если вы включите эту функцию. Устройство будет хранить основную информацию журнала, в основном выполняя данные, в течение приблизительно 1 месяца. Данные будут доступны для загрузки только во время послепродажного обслуживания для облегчения отладки проблем. При необходимости данные могут быть безопасно переданы из Австрии в Китай для дальнейшего анализа. Однако после решения проблемы данные будут незамедлительно удалены для обеспечения их конфиденциальности и защиты.
key_log_switch_note_2 = Для получения дополнительной информации о защите конфиденциальности см. <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Политику конфиденциальности плана улучшения послепродажного обслуживания маршрутизатора ZTE Smart</a>.<br/>Для улучшения качества услуг и опыта мы рекомендуем вам присоединиться к этому плану послепродажного улучшения.
