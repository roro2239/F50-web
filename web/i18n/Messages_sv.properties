faq_index_indicator_title = Vad anger indikatorlampan?
faq_index_mesh_problem_step_1 = 1. Kunde mesh-nätverk inte bildas?
faq_index_mesh_problem_step_1_explain = För att bilda mesh-nätverk måste följande villkor vara uppfyllda:<br/>1) Två enheter ska inte vara för långt borta från varandra (1–3 meter). När du har skapat Wi-Fi-mesh-nätverket placerar du enheten på en lämplig plats i hemmet. Kontrollera <a href="#mesh_device_list">Mina mesh-enheter</a> för att se mesh-nätverket. Om underenheten är för långt från huvudenheten försämras mesh-nätverkets prestanda.<br/>2) Den nya enheten som används som underenhet får inte ställas in (gäller endast fabriksinställningar). Om enheten är inställd, återställer du den till fabriksinställningar innan mesh-nätverket bildas.<br/>3) Tryck på enhetens WPS-knapp så blinkar indikatorlampan.
faq_index_mesh_problem_step_2 = 2. Hur lång tid tar det att bilda ett mesh-nätverk? Hur vet jag att ett mesh-nätverk har bildats?
faq_index_mesh_problem_step_2_explain = Det kan ta 2 till 3 minuter, under vilka enhetens indikatorlampa fortsätter att blinka vitt. När enheten är i mesh-nätverket tänds dess nätverksindikatorlampa på ett normalt sätt. Du kan också visa mesh-enheter i <a href="#mesh_building">topologivyn</a> på motsvarande skärm.
faq_index_mesh_problem_step_3 = 3. Är två mesh-enheter långt ifrån varandra?
faq_index_mesh_problem_step_3_explain = Prova någon av följande metoder:<br/>1) Lägg till fler mesh-enheter för att bilda mesh-nätverk (du måste köpa extra enheter).<br/>2) Om det inte finns fler enheter i mesh-nätverket kan du använda en nätverkskabel för att ansluta LAN-porten på huvudmesh-enheten och alla nätverksportar på underenheten för att säkerställa stabil dataöverföring mellan de två enheterna.
faq_index_mesh_problem_step_4 = 4. Vad ska vi göra i följande fall efter att nätverket har upprättats?
faq_index_mesh_problem_step_4_explain = 1) Efter att ett mesh-nätverk har bildats, kan enheterna störa varandra om avståndet mellan dem är för litet. I så fall ska underenheten placeras minst en meter från huvudenheten.<br/>2) När mesh-nätverket har bildats, kan du inte komma åt nätverket om underenheten är utanför mesh-nätverket. Om du vill använda enheten, lägger du till den i det befintliga mesh-nätverket igen eller återställer den till fabriksinställningarna och bildar sedan ett annat mesh-nätverk.<br/>3) När mesh-nätverket har bildats delar enheter i mesh-nätverket samma Wi-Fi-parametrar, och Wi-Fi-enheter i ditt hem kommer att anslutas till en närbelägen mesh-enhet. Om det inträffar fel på en underenhet och dess indikatorlampa blir röd, så kommer underenhetens Wi-Fi att vara otillgängligt och Wi-Fi-enheter i ditt hem kommer att anslutas till en annan tillgänglig närbelägen mesh-enhet. Vi rekommenderar att du åtgärdar problemet med underenhetens Wi-Fi-anslutning som påverkar användningen av ditt hems Wi-Fi. = Kontrollera ditt nätverk enligt följande steg:<br/>1. Kontrollera routerns nätverkskabelanslutning.<br/>2. Kontrollera enhetens nätverksparametrar i <a href="#internet_setting">Anslutningsinställningar</a>.
