key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >ZTE Smart Router After-sales Improvement Plan Privacy Policy</a>. To provide better services and experience, we recommend you join this after-sales improvement plan.
key_log_switch_note_1 = In order to better locate the possible problems of your router and ensure the normal and stable operation of your router, we will collect some of your device key log information such as: WiFi enable and disable, registration successfull action, signal strength, network type change, CELL handover, drop network, PDP connect and disconnect,WiFi running abnormal, restart action, FOTA start and end action, network cable plugging. <br/>These information will be exported when your device is sent to after sale center if you enable this function. The device will store key log information, primarily running data, for approximately 1 month. The data will be only available for download during after-sales service to aid in issue debugging. If necessary, the data may be securely transferred from Austria to China for further analysis. However, once the issue is resolved, the data will be promptly deleted to ensure privacy and data protection.
key_log_switch_note_2 = For more privacy protection contents, refer to the <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >ZTE Smart Router After-sales Improvement Plan Privacy Policy</a>.<br/>To provide better services and experience, we recommend you join this after-sales improvement plan.
