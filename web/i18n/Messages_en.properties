faq_index_indicator_title = What''s the indicator light define?
faq_index_mesh_problem_step_1 = 1. Failed to form a mesh network?
faq_index_mesh_problem_step_1_explain = To successfully form mesh network, please make sure to meet the following conditions:<br/>1) Two devices should not be too far away from each other (1-3 meters). After creating the WiFi Mesh network，place the device in a proper location in the home. If the sub device is too far away from the main device, the home mesh network performance will deteriorate.<br/>2) The new device that is used as sub device must not be set (applies factory defaults only). If the device is set, please reset it to factory defaults before forming mesh network.<br/>3) Press each device''s WPS button and indicator light flashes.
faq_index_mesh_problem_step_2 = 2. How long does it take to form a mesh network? How do I know that a mesh network is formed successfully?
faq_index_mesh_problem_step_2_explain = It may take 2 to 3 minutes, during which device''s indicator light keeps flashing white. When device is in mesh network, its network indicator light will light up in a normal way; you can also view mesh devices in topology view on the corresponding screen.
faq_index_mesh_problem_step_3 = 3. Two mesh devices are far away from each other?
faq_index_mesh_problem_step_3_explain = Try any of the following methods:<br/>1) Add more mesh devices to form mesh network (you need to purchase extra devices).<br/>2) If there are no more devices in the Mesh network, you can use a network cable to connect the LAN port of the main mesh device and any network port of the sub-device to ensure stable data transmission between the two devices.
faq_index_mesh_problem_step_4 = 4. What should we do in the following cases after the networking is successful?
faq_index_mesh_problem_step_4_explain = 1) After mesh network is formed, if the distance between two devices is too close, they may interfere with each other. In this case, place the sub device at least one meter away from the main device.<br/>2) After mesh network is formed, if sub device is outside of the mesh network, you cannot access network. To use the device, please add it to the existing mesh network again or reset it to factory defaults and then form another mesh network.<br/>3) With mesh network formed, devices in mesh network share the same Wi-Fi parameters, and Wi-Fi devices at your home will connect to a nearby mesh device. If sub device failure occurs and its indicator light turns red, the sub device''s Wi-Fi will be unavailable, and Wi-Fi devices at your home will connect to another available mesh device nearby. It''s advised to fix sub device''s Wi-Fi connection issue which affects your home Wi-Fi using experience. Check your network in the following steps:<br/>1. Check router''s network cable connection.<br/>2. Check device''s network parameters in <a href="#mobile_network">Connection Settings</a>.
