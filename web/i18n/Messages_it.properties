wifi_off_alert_with_mesh = La rete mesh è stata distribuita e la disattivazione del Wi-Fi significa che anche la rete mesh è disattivata. Per riaprire il Wi-Fi, è necessario connettere il dispositivo al PC e accedere alla WebUI. Continuare?
wifi_opti_auto_disable = Il canale corrente è ora definito manualmente. La funzione di scansione automatica sarà disabilitata.
wifi_opti_cant_opti = Se è stato selezionato manualmente un canale nella pagina delle impostazioni di SSID principale, non è possibile utilizzare la funzione Ottimizza. Modificare le impostazioni del canale SSID principale su automatico per poter utilizzare la funzione Ottimizzazione.
wifi_opti_cant_select_ch = È stato scelto un canale fisso nella pagina delle impostazioni di SSID principale. Non è possibile selezionare un canale fisso in Ottimizzazione Wi-Fi se le impostazioni di SSID principale sono in modalità manuale.
wifi_opti_note_channel_list = Elenco canali: elenca tutti i canali dopo la scansione e se l’utente fa clic sulla barra dei canali, la linea verrà espansa e mostrerà tutti gli hotspot su questo canale.
wifi_opti_note_interference_tips = La casella a colori: indica lo stato di interferenza del canale.
wifi_opti_note_mild_interference = Canale buono significa che vi sono poche interferenze su questo canale.
wifi_opti_note_mod_interference = Canale debole significa che su questo canale c’è un’interferenza maggiore, e se il canale corrente del dispositivo è su questo, si suggerisce all’utente di ottimizzare la rete.
wifi_opti_note_no_interference = Canale perfetto significa che non vi sono interferenze su questo canale.
wifi_opti_note_scan_channel = Scansiona canale Wi-Fi: il dispositivo esegue la scansione del canale corrente quando l’utente fa clic su questo pulsante.
wifi_opti_note_ser_interference = Canale terribile significa che su questo canale ci sono moltissime interferenze, e se il canale corrente del dispositivo è su questo, si suggerisce all’utente di ottimizzare la rete.
wifi_opti_note_set_channel = Ottimizzazione Wi-Fi: il dispositivo ottimizzerà il canale Wi-Fi e poi rimarrà su un canale più libero.
wifi_opti_select_ch_tips = Il canale selezionato scadrà dopo 1 ora o dopo che si fa clic sul pulsante Ottimizzazione. Il Wi-Fi non funziona durante l’ottimizzazione.<br/>Continuare?
wifi_opti_single_ssid_info = Quando è abilitato un singolo SSID, verrà unito solo il nome (SSID) del Wi-Fi e l’ottimizzazione del canale Wi-Fi rispettivamente per la banda di frequenza a 2,4 GHz e a 5 GHz continuerà a essere applicata.
