ztelink_manage_odu_has_bluetooth = Un dispositivo dotato di funzionalità Bluetooth (come MC7010, MC889) può essere collegato utilizzando l’app Install Helper, che guiderà l’utente nel processo di creazione di una connessione.
ztelink_manage_odu_has_idu1 = Se si desidera utilizzare l’app ZTELink per gestire il router esterno ZTE tramite il Wi-Fi del router interno, è necessario:
ztelink_manage_odu_has_idu2 = 1. Collegare il router esterno a uno interno dotato di funzionalità Wi-Fi (di solito il router esterno si connette a uno in casa per consentire la connessione dei dispositivi interni).
ztelink_manage_odu_has_idu3 = 2. Se l’app ZTELink è installata sul telefono, connettere il telefono al Wi-Fi del router interno.
ztelink_manage_odu_has_idu4 = 3. Aprire l\’app ZTELink per connettersi al router esterno.
ztelink_manage_odu_no_bluetooth = Un dispositivo che non dispone della funzionalità Bluetooth (come MF266, MF268) deve essere connesso al Wi-Fi del router interno utilizzando l’app Install Helper, che guiderà l’utente nel processo di creazione di una connessione.
