wifi_move_fail = Sincronizzazione non riuscita; la causa potrebbe dipendere dalle seguenti condizioni:<br/>1. La modalità di sicurezza Wi-Fi del vecchio dispositivo è WPA3 o WPA2/WPA3.<br/>2. Il Wi-Fi del vecchio dispositivo è APERTO, il nome della rete è troppo lungo o la password ha troppi caratteri.<br/>3. Il pulsante WPS del vecchio dispositivo e il pulsante WPS del nuovo dispositivo non sono stati premuti entro 2 minuti.<br/>4. Il Wi-Fi è influenzato dall’ambiente circostante.
wifi_move_info = Sincronizza il nome e la password Wi-Fi a 2,4 GHz del vecchio dispositivo con il nuovo dispositivo.
wifi_move_password_empty = La password di rete del vecchio dispositivo è vuota; inserire la password di rete.
wifi_move_success = Spostamento riuscito; spegnere il vecchio dispositivo per evitare la connessione alla vecchia rete.
wifi_move_tips = Suggerimenti:<br/>1. È possibile sincronizzare solo il nome e la password Wi-Fi a 2,4 GHz.<br/>2. La sincronizzazione dei parametri Wi-Fi richiederà diversi minuti e potrebbe non riuscire a causa di un problema di incompatibilità con il vecchio dispositivo.<br/>3. Premere il pulsante WPS sul vecchio dispositivo, quindi fare clic su "Avvia spostamento".
wifi_move_title = Spostamento impostazioni Wi-Fi
wifi_move_wait = Spostamento in corso...<br/>Confermare che WPS è abilitato sul vecchio dispositivo.<br/>Potrebbero essere necessari da 1 a 2 minuti.
