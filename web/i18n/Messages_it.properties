watch_dog = Watchdog
watch_dog_info = è possibile immettere un nome dominio o un indirizzo IP e il dispositivo eseguirà il ping di questo indirizzo nell’intervallo di tempo. Se il ping non riesce nella soglia di riavvio, il dispositivo si riavvierà automaticamente. Se considera la rete anomala, il dispositivo tenterà il ripristino 3 volte. In caso di guasto, il ping successivo verrà eseguito dopo 2 ore.
watch_dog_loading = Il parametro viene inviato e il controllo dell’URL/indirizzo IP è raggiungibile.
watch_dog_not_support_ipv6 = La funzione watchdog non ha effetto sulla rete "ipv6 only"
watch_dog_note = Usare questa funzione con cautela e impostare un valore adeguato. Assicurarsi che il set di indirizzi di dominio sia valido; un indirizzo di dominio non valido potrebbe causare il riavvio anomalo del dispositivo.
watch_dog_note_interval_time = Il dispositivo tenterà di eseguire il ping in base all’intervallo di tempo per 3 volte; se non riesce, proverà di nuovo dopo 2 ore
watch_dog_note_ipv6 = La funzione watchdog non ha effetto sulla rete "ipv6 only".
watch_dog_reboot_too_much_warning = Se l’IP/URL non è raggiungibile e il dispositivo si riavvia frequentemente più di 5 volte, il watchdog verrà disabilitato. Sarà riavviato manualmente dall’amministratore del dispositivo.
watch_dog_setting = Impostazioni Watchdog
watch_dog_setting_fail = Impossibile eseguire il ping dell’indirizzo impostato. Verificare se la rete corrente è normale e assicurarsi che sia possibile eseguire il ping del dispositivo. In caso contrario, il dispositivo sarà riavviato continuamente.
watch_dog_time_interval_check = Parametro errato. L’intervallo di tempo deve essere superiore a 2
