faq_index_indicator_title = Cosa indica la spia luminosa?
faq_index_mesh_problem_step_1 = 1. Impossibile creare una rete mesh?
faq_index_mesh_problem_step_1_explain = Per creare correttamente la rete mesh, assicurarsi di soddisfare le seguenti condizioni:<br/>1) Due dispositivi non devono essere troppo lontani l’uno dall’altro (1-3 metri). Dopo aver creato la rete mesh WiFi, posizionare il dispositivo in una luogo adeguato nell’abitazione. Se il dispositivo secondario è troppo lontano da quello principale, le prestazioni della rete mesh domestica peggioreranno.<br/>2) Non è necessario impostare il nuovo dispositivo utilizzato come dispositivo secondario (sono applicate solo le impostazioni predefinite di fabbrica). Se il dispositivo è impostato, ripristinarlo alle impostazioni predefinite di fabbrica prima di creare la rete mesh.<br/>3) Premere il pulsante WPS di ciascun dispositivo e la spia luminosa lampeggerà.
faq_index_mesh_problem_step_2 = 2. Quanto tempo ci vuole per creare una rete mesh? Come faccio a sapere che una rete mesh è stata creata correttamente?
faq_index_mesh_problem_step_2_explain = Potrebbero essere necessari da 2 a 3 minuti, durante i quali la spia luminosa del dispositivo continuerà a lampeggiare di bianco. Quando il dispositivo si trova nella rete mesh, la spia luminosa di rete si accenderà in modo normale; è anche possibile visualizzare i dispositivi mesh nella vista topologia all’interno della schermata corrispondente.
faq_index_mesh_problem_step_3 = 3. Due dispositivi di rete sono lontani l’uno dall’altro?
faq_index_mesh_problem_step_3_explain = Provare uno dei seguenti metodi:<br/>1) Aggiungere altri dispositivi mesh per creare la rete mesh (è necessario acquistare dispositivi aggiuntivi).<br/>2) Se non sono presenti più dispositivi nella rete mesh, è possibile utilizzare un cavo di rete per collegare la porta LAN del dispositivo mesh principale e qualsiasi porta di rete del dispositivo secondario, per garantire una trasmissione stabile dei dati tra i due dispositivi.
faq_index_mesh_problem_step_4 = 4. Cosa dobbiamo fare nei seguenti casi dopo che la connessione di rete è stata eseguita correttamente?
faq_index_mesh_problem_step_4_explain = 1) Una volta creata la rete mesh, se la distanza tra due dispositivi è troppo vicina, questi possono interferire tra loro. In questo caso, posizionare il dispositivo secondario ad almeno un metro di distanza da quello principale.<br/>2) Una volta creata la rete mesh, se il dispositivo secondario si trova al di fuori della rete mesh, non è possibile accedere alla rete. Per utilizzare il dispositivo, aggiungerlo nuovamente alla rete mesh esistente o ripristinarlo alle impostazioni predefinite di fabbrica e creare un’altra rete mesh.<br/>3) Dopo aver creato la rete mesh, i dispositivi di tale rete condividono gli stessi parametri Wi-Fi e i dispositivi Wi-Fi presso l’abitazione si connettono a un dispositivo mesh nelle vicinanze. Se si verifica un guasto del dispositivo secondario e la spia luminosa diventa rossa, il Wi-Fi del dispositivo secondario non sarà disponibile e i dispositivi Wi-Fi in casa si connetteranno a un altro dispositivo mesh disponibile nelle vicinanze. Si consiglia di risolvere il problema di connessione Wi-Fi del dispositivo secondario che influisce sul Wi-Fi domestico sfruttando la propria esperienza d’uso. Controllare la rete secondo i seguenti passaggi:<br/>1. Controllare il collegamento del cavo di rete del router.<br/>2. Controllare i parametri di rete del dispositivo in <a href=#mobile_network>Impostazioni di connessione</a>.
