mlo_switch = MLO
mlo_info = Jei įjungtas, įtaisas naudos MLO daugiasluoksnį prijungimą, o Wi-Fi 7 prieigos įtaisas nepriklausomai pasirinks vienu metu prieigą prie dažnių juostos, kad padidintų greitį ir sumažintų latenciją.
band_steering_and_mlo_info = Įjungus vieną SSID arba MLO, prietaiso dažniai vis dar veikia vienu metu ir bus derinamas ir parodytas Wi-Fi tinklo pavadinimas. Išjungus vieną SSID ir MLO, kiekvienos dažnių juostos Wi-Fi tinklo pavadinimą reikia nustatyti atskirai.
mlo_security_mode_warn = MLO tinklo saugumui naudokite šifruotus saugumo metodus ir nustatykite 2,4 GHz tinklo slaptažodį.
mlo_security_mode_warn_ex = MLO tinklo saugumui naudokite šifruotą saugumo režimą ir nustatykite tinklo slaptažodį.
mlo_open_info = Įrenginys naudos nustatytus 2,4 GHz tinklo parametrus, o tinklo re žimas bus pakeistas į 802,11. Jums reikės iš naujo prijungti Wi-Fi prietaisus, kurie buvo prijungti prie kitų Wi-Fi dažnių juostos. Tęsti?
mlo_open_info_owe = Įtaise bus naudojami nustatyti 2,4 GHz tinklo parametrai, o tinklo režimas bus pakeistas į 802,11. Saugumo režimas (6GHz) bus pakeistas į WPA3-SAE (SAE). Jums reikės vėl sujungti Wi-Fi prietaisus, kurie buvo sujungti su kitomis Wi-Fi dažnių juostomis. tęsti?
mlo_wifi5_on_info = Wi-Fi7 MLO įjungtas. Jei norite įjungti Wi-Fi7 5 suderinamumo režimą, išjungkite MLO.
mlo_no_be_info = Įjungta Wi-Fi7 funkcija MLO ir galima naudoti tik 802.11BE.
mlo_off_info = Siekiant tinklo suderinamumo, 2,4GHz ir 5GHz tinklo režimas bus pakeistas į 802,11 ašį, visi prijungti įtaisai vėl prijungiami po Wi-Fi atnaujinimo. Tęsti?
band_steering_intro_info_new = Jei įjungta, optimali prieiga prie dažnio bus automatiškai pasirinkta prieigos metu.

