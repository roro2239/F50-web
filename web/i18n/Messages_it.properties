privacy_policy = Informativa sulla privacy
privacy_policy_note_1 = Per ricevere il servizio di aggiornamento del sistema di router e assicurarsi che i dispositivi del router funzionino correttamente, è necessario raccogliere le seguenti informazioni:
privacy_policy_note_2 = <b>IMEI, SN e la versione software del router</b>.
privacy_policy_note_3 = È possibile decidere di scaricare la versione più recente ed eseguire l’aggiornamento per risolvere i possibili rischi che il sistema potrebbe avere. Nel frattempo, è possibile scegliere di attivare la funzionalità di aggiornamento automatico per risolvere gli errori critici che il sistema potrebbe avere e aggiornare la patch di protezione. Questa funzionalità è abilitata come impostazione predefinita. Per disattivare la funzione, passare a Impostazioni avanzate > Aggiorna nella pagina di gestione basata sul web. Inoltre, l’aggiornamento della versione utilizzerà i dati mobili.
privacy_policy_tro69_note_1 = Al fine di consentirti di utilizzare il CWMP (un protocollo Internet) per gestire in remoto i tuoi dispositivi mobili a banda larga, l’operatore raccoglierà ed elaborerà alcune delle tue informazioni personali. Le informazioni vengono controllate ed elaborate dall’operatore, mentre ZTE fornisce solo il dispositivo mobile a banda larga.
privacy_policy_tro69_note_2 = Per ulteriori dettagli sulle informazioni personali dell’utente o per eventuali domande relative ai suoi diritti in qualità di interessato o relative al trattamento dei dati personali da parte dell’operatore, si prega di contattare l’operatore.
privacy_policy_url = Toccando ACCETTO si dichiara di aver compreso e accettato i termini di cui sopra. Per maggiori informazioni sulla tutela della privacy, leggere l’<a href=https://www.ztedevices.com/en/Privacy-Policy/ZTESmartRouterPrivacyPolicy target=_blank >Informativa sulla privacy di ZTE</a>.
