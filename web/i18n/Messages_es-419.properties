apn_mode_note_1 = Es proporcionado por su proveedor de servicios de Internet (Internet Service Provider, ISP). El protocolo de autenticación de contraseña (Password Authentication Protocol, PAP) proporciona un método simple sin cifrado para que el par establezca su identidad mediante un protocolo de enlace bidireccional. El protocolo de autenticación por desafío mutuo (Challenge-Handshake Authentication Protocol, CHAP) se utiliza para verificar periódicamente la identidad del par mediante un protocolo de seguridad de 3 vías.
