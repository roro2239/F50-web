key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de privacidad del Plan de mejora posventa del enrutador inteligente ZTE</a>.
key_log_setting_note_6 = Para brindar mejores servicios y experiencia, le recomendamos que se una a este plan de mejora posventa.
key_log_switch_note_1 = Con el fin de localizar mejor los posibles problemas de su enrutador y garantizar el funcionamiento normal y estable del mismo, recopilaremos información clave de registro de su dispositivo, como:  activación y desactivación de WiFi, acción de registro exitosa, intensidad de la señal, cambio de tipo de red, cambio de celda, pérdida de red, conexión y desconexión de PDP, funcionamiento anormal de WiFi, acción de reinicio, inicio y fin de FOTA, conexión de cable de red. <br/>Esta información se exportará cuando su dispositivo se envíe al centro de posventa si habilita esta función.  El dispositivo almacenará información de registro clave, principalmente datos en ejecución, durante aproximadamente 1 mes. Los datos solo estarán disponibles para su descarga durante el servicio posventa para ayudar en la depuración de problemas. Si es necesario, los datos pueden transferirse de forma segura de Austria a China para su posterior análisis. Sin embargo, una vez resuelto el problema, los datos se eliminarán de inmediato para garantizar la privacidad y la protección de los datos.
key_log_switch_note_2 = Para obtener más contenido sobre protección de la privacidad, consulte la <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de privacidad del Plan de mejora posventa del enrutador inteligente ZTE</a>.<br/>Para brindar mejores servicios y experiencia, le recomendamos que se una a este plan de mejora posventa.
