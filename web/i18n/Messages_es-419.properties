watch_dog_info = Puede ingresar un nombre de dominio o una dirección IP y luego el dispositivo hará ping a esta dirección en el intervalo de tiempo. Si el ping falla en el umbral de reinicio, el dispositivo se reiniciará automáticamente. Teniendo en cuenta la red anormal, el dispositivo intentará recuperarse 3 veces. Si también falla, el siguiente ping se realizará 2 horas después.
