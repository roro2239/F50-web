watch_dog_reboot_too_much_warning = Si no se puede acceder a la IP/URL y el dispositivo se reinicia con frecuencia más de 5 veces, se desactivará el dispositivo de vigilancia. El administrador de dispositivos lo reiniciará de forma manual.
