faq_index_indicator_title = ¿Qué define la luz indicadora?
faq_index_mesh_problem_step_1 = 1. ¿No se ha podido formar una red en malla?
faq_index_mesh_problem_step_1_explain = Para formar correctamente una red en malla, asegúrese de cumplir con las siguientes condiciones:<br/>1) Dos dispositivos no deben estar demasiado lejos uno del otro (1-3 metros). Después de crear la red en malla WiFi, coloque el dispositivo en una ubicación adecuada en el hogar. Si el subdispositivo está demasiado lejos del dispositivo principal, el rendimiento de la red en malla doméstica se deteriorará.<br/>2) No se debe configurar el nuevo dispositivo que se utiliza como subdispositivo (aplica solo los valores predeterminados de fábrica). Si el dispositivo está configurado, restablezca a los valores predeterminados de fábrica antes de formar la red en malla.<br/>3) Presione el botón WPS de cada dispositivo y la luz indicadora parpadeará.
faq_index_mesh_problem_step_2 = 2. ¿Cuánto tiempo se tarda en formar una red en malla? ¿Cómo sé que se forma una red en malla con éxito?
faq_index_mesh_problem_step_2_explain = Puede tomar de 2 a 3 minutos, durante los cuales la luz indicadora del dispositivo sigue parpadeando en color blanco. Cuando el dispositivo está en la red en malla, la luz indicadora de red se encenderá de manera normal; también puede ver los dispositivos en malla en la <a href="#mesh_building">vista de topología</a> en la pantalla correspondiente.
faq_index_mesh_problem_step_3 = 3. ¿Están los dos dispositivos en malla lejos uno del otro?
faq_index_mesh_problem_step_3_explain = Pruebe cualquiera de los siguientes métodos:<br/>1) Agregue más dispositivos en malla para formar una red en malla (debe comprar dispositivos adicionales).<br/>2) Si no hay más dispositivos en la red en malla, puede usar un cable de red para conectar el puerto LAN del dispositivo en malla principal y cualquier puerto de red del subdispositivo para garantizar una transmisión de datos estable entre los dos dispositivos.
faq_index_mesh_problem_step_4 = 4. ¿Qué debemos hacer en los siguientes casos después de que se formó la red de manera exitosa?
faq_index_mesh_problem_step_4_explain = 1) Después de que se formó la red en malla, si la distancia entre dos dispositivos es demasiado cercana, pueden interferir entre sí. En este caso, coloque el subdispositivo al menos a un metro de distancia del dispositivo principal.<br/>2) Después de que se formó la red en malla, si el subdispositivo está fuera de la red en malla, no podrá acceder a la red. Para usar el dispositivo, agréguelo de nuevo a la red en malla existente o restablezca los valores predeterminados de fábrica y luego forme otra red en malla.<br/>3) Con la red en malla formada, los dispositivos en la red en malla comparten los mismos parámetros Wi-Fi, y los dispositivos Wi-Fi en su hogar se conectarán a un dispositivo en malla cercano. Si se produce una falla del subdispositivo y su luz indicadora se enciende en rojo, el Wi-Fi del subdispositivo no estará disponible y los dispositivos Wi-Fi de su hogar se conectarán a otro dispositivo en malla disponible cercano. Se recomienda solucionar el problema de conexión Wi-Fi del subdispositivo que afecta la experiencia de uso de Wi-Fi en su hogar. Verifique su red en los siguientes pasos:<br/>1. Verifique la conexión del cable de red del enrutador.<br/>2. Compruebe los parámetros de red del dispositivo en <a href="#internet_setting">Connection Settings</a> (Configuración de conexión).
