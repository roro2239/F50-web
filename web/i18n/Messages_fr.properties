ztelink_manage_odu_no_bluetooth = Pour un appareil qui ne dispose pas de la fonctionnalité Bluetooth (comme MF266, MF268), vous devez vous connecter au Wi-Fi du routeur intérieur en utilisant l’application Install Helper qui vous guidera tout au long du processus de création d’une connexion.
ztelink_scan_info = Vous pouvez scanner le code QR pour installer l’application et gérer votre appareil à distance.

mlo_switch = MLO
mlo_info = S'il est activé, l'appareil utilisera la connexion Multi - Liaison MLO et l'appareil d'accès Wi - Fi 7 sélectionnera indépendamment l'accès simultané à la bande pour augmenter le débit et réduire la latence.
band_steering_and_mlo_info = Si vous activez « Single SSID » ou « MLO », les fréquences des appareils fonctionnent toujours simultanément et le nom du réseau wi - Fi est combiné et affiché. Si vous désactivez les SSID et MLO individuels, vous devez définir le nom du réseau wi - Fi pour chaque bande de fréquence séparément.
mlo_security_mode_warn = Pour la sécurité du réseau MLO, utilisez une méthode de sécurité cryptée et définissez un mot de passe pour le réseau 2,4 GHz.
mlo_security_mode_warn_ex = Pour la sécurité du réseau MLO, utilisez le mode de sécurité cryptographique et définissez un mot de passe réseau.
mlo_open_info = L'appareil utilisera les paramètres réseau 2,4 GHz déjà définis et le mode réseau passera à 802.11. Vous devrez reconnecter les appareils Wi - Fi connectés à d'autres bandes Wi - fi. Continue?
mlo_open_info_owe = Le périphérique utilisera les paramètres réseau 2,4 GHz déjà définis et le mode réseau passera à 802.11. Le mode sans échec (6 GHz) passera à wpa3 - SAE (SAE). Vous devrez reconnecter votre appareil Wi - Fi connecté à une autre bande Wi - fi. Continue?
mlo_wifi5_on_info = Le MLO Wi - Fi 7 est activé. Si vous souhaitez activer le mode de compatibilité Wi - Fi 7, désactivez le MLO.
mlo_no_be_info = La fonction Wi - fi7 MLO est activée et ne peut utiliser que la norme 802.11be.
mlo_off_info = Pour des raisons de compatibilité réseau, les modes réseau 2,4 GHz et 5 GHz passeront à 802.11 ax et tous les appareils connectés seront reconnectés après le redémarrage du Wi - fi. Continue?
band_steering_intro_info_new = Si elle est activée, la meilleure fréquence d'accès sera automatiquement sélectionnée lors de la visite.

