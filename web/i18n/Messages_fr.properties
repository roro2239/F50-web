faq_index_indicator_title = Quelle est la définition du voyant lumineux ?
faq_index_mesh_problem_step_1 = 1. Vous n’avez pas réussi à former un réseau maillé ?
faq_index_mesh_problem_step_1_explain = Pour réussir à former un réseau maillé, veuillez vous assurer de répondre aux conditions suivantes :<br/>1) Deux appareils ne doivent pas être trop éloignés l’un de l’autre (1 à 3 mètres). Après avoir créé le réseau Wi-Fi maillé, placez l’appareil à un emplacement approprié au domicile. Si le sous-appareil est trop éloigné de l’appareil principal, les performances du réseau maillé domestique se détériorent.<br/>2) Le nouvel appareil qui est utilisé comme sous-appareil ne doit pas être configuré (appliquant les valeurs d’usine par défaut uniquement). Si l’appareil est configuré, veuillez le réinitialiser aux paramètres d’usine par défaut avant de former un réseau maillé.<br/>3) Appuyez sur le bouton WPS de chaque appareil et le voyant lumineux clignotera.
faq_index_mesh_problem_step_2 = 2. Combien de temps faut-il pour former un réseau maillé ? Comment savoir qu’un réseau maillé a été formé avec succès ?
faq_index_mesh_problem_step_2_explain = Cela peut prendre 2 à 3 minutes, pendant lesquelles le voyant lumineux Wi-Fi de l’appareil continue de clignoter en blanc. Lorsque l’appareil est en réseau maillé, son voyant lumineux réseau s’allume de manière normale ; vous pouvez également afficher les appareils maillés en <a href="#mesh_building">vue topologique</a> sur l’écran correspondant.
faq_index_mesh_problem_step_3 = 3. Deux appareils maillés sont éloignés l’un de l’autre ?
faq_index_mesh_problem_step_3_explain = Essayez l’une des méthodes suivantes :<br/>1) Ajoutez plus d’appareils maillés pour former un réseau maillé (vous devez acheter des appareils supplémentaires).<br/>2) S’il n’y a plus d’appareils dans le réseau maillé, vous pouvez utiliser un câble réseau pour connecter le port LAN de l’appareil maillé principal et tout port réseau du sous-appareil afin d’assurer une transmission stable des données entre les deux appareils.
faq_index_mesh_problem_step_4 = 4. Que devons-nous faire dans les cas suivants une fois le réseautage réussi ?
faq_index_mesh_problem_step_4_explain = 1) Une fois le réseau maillé formé, si la distance entre deux appareils est trop proche, ils peuvent interférer l’un avec l’autre. Dans ce cas, placez le sous-appareil à au moins un mètre de l’appareil principal.<br/>2) Une fois le réseau maillé formé, si le sous-appareil est à l’extérieur du réseau maillé, vous ne pouvez pas accéder au réseau. Pour utiliser l’appareil, veuillez l’ajouter à nouveau au réseau maillé existant ou le réinitialiser aux paramètres d’usine par défaut, puis former un autre réseau maillé.<br/>3) Une fois le réseau maillé formé, les appareils du réseau maillé partagent les mêmes paramètres Wi-Fi et les appareils Wi-Fi de votre maison se connecteront à un appareil maillé à proximité. Si une défaillance du sous-appareil survient et que son voyant lumineux devient rouge, le Wi-Fi du sous-appareil sera indisponible et les appareils Wi-Fi de votre domicile se connecteront à un autre appareil maillé disponible à proximité. Il est conseillé de résoudre le problème de connexion Wi-Fi du sous-appareil qui affecte l’expérience d’utilisation du Wi-Fi de votre domicile. Vérifiez votre réseau en suivant les étapes suivantes :<br/>1. Vérifiez la connexion du câble réseau du routeur.<br/>2. Vérifiez les paramètres réseau de l’appareil dans <a href="#internet_setting">Paramètres réseau</a>.
