ztelink_manage_odu_has_bluetooth = Pour un appareil doté de la fonctionnalité Bluetooth (tel que MC7010, MC889), vous pouvez le connecter en utilisant l’application Install Helper qui vous guidera tout au long du processus de création d’une connexion.
