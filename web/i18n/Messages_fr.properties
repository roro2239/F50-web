key_log_setting_note_6 = Pour offrir de meilleurs services et une meilleure expérience, nous vous recommandons de rejoindre ce plan d’amélioration après-vente.
key_log_switch_note_1 = Afin de mieux localiser les problèmes possibles de votre routeur et d’assurer le fonctionnement normal et stable de votre routeur, nous collecterons certaines des informations du journal clé de votre appareil telles que : l’activation et la désactivation du Wi-Fi, l’action d’enregistrement réussie, la force du signal, le changement de type de réseau, le transfert CELL, le réseau de dérivation, la connexion et la déconnexion du PDP, l’exécution du Wi-Fi anormale, l’action de redémarrage, l’action de début et de fin du FOTA, le branchement du câble réseau. <br/>Ces informations seront exportées lorsque votre appareil sera envoyé au centre de service après-vente si vous activez cette fonction. L’appareil stockera les informations clés du journal, principalement les données en cours d’exécution, pendant environ 1 mois. Les données ne seront disponibles au téléchargement que pendant le service après-vente pour faciliter le débogage des problèmes. Si nécessaire, les données pourront être transférées en toute sécurité de l’Autriche vers la Chine pour une analyse plus approfondie. Cependant, une fois le problème résolu, les données seront rapidement supprimées afin de garantir leur confidentialité et leur protection.
key_log_switch_note_2 = Pour afficher plus de contenu sur la protection de la vie privée, reportez-vous à la <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Politique de confidentialité du Plan d'amélioration après-vente du routeur intelligent ZTE</a>.<br/>Pour offrir de meilleurs services et une meilleure expérience, nous vous recommandons de rejoindre ce plan d’amélioration après-vente.
