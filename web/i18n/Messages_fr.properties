apn_mode_note_1 = Il est fourni par votre fournisseur d'accès à Internet (FAI). PAP (Password Authentication Protocol) propose une méthode simple sans chiffrement pour que l'homologue établisse son identité via l'établissement d'une liaison bipartite. Protocole CHAP (Challenge-Handshake Authentication Protocol) permet de vérifier régulièrement l'identité de l'homologue via l'établissement d'une liaison tripartite.
