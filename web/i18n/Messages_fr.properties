apn_note_dns_mode = Mode DNS : Si une adresse IP fixe est fournie par votre fournisseur de services, sélectionnez DNS manuel. Dans le cas contraire, sélectionnez DNS Auto, et l’appareil récupérera automatiquement les paramètres.
