ztelink_manage_odu_no_bluetooth = For en enhet som ikke har Bluetooth-funksjonalitet (for eksempel MF266, MF268), må du koble til innendørsruterens Wi-Fi ved hjelp av appen «Installer Helper» som vil veilede deg gjennom prosessen med å bygge en tilkobling.
ztelink_scan_info = Du kan skanne QR-koden for å installere appen for å administrere enheten eksternt.

mlo_switch = MLO
mlo_info = Hvis det slås på, vil enheten bruke MLO multi link-forbindelse, og Wi-Fi 7-tilgang-enheten vil selvfølgelig velge samtidig frekvensbandadgang for å øke hastigheten og redusere latennigheten.
band_steering_and_mlo_info = Hvis en enkelt SSID eller MLO slås på, virker enhetens frekvens samtidig, og et Wi-Fi nettverk vil kombineres og vises. Hvis du slår av Enkel SSID og MLO, må du sette navnet på Wi-Fi-nettverket på hvert frekvensband separat.
mlo_security_mode_warn = For MLO-nettverket, bruk kryptert sikkerhetsmetoder og sett et passord for 2,4GHz-nettverket.
mlo_security_mode_warn_ex = For MLO-nettverket, bruk kryptert sikkerhetstiltak og sett et passord til nettverket.
mlo_open_info = Innretningen vil bruke de 2,4GHz nettverksparametrene som er satt, og nettverksmoden vil endres til 802,11. Du må koble Wi-Fi-enhetene som var koblet til de and re Wi-Fi frekvensbandet. Fortsett?
mlo_open_info_owe = Innretningen vil bruke de 2,4GHz-nettverksparametrene som er satt, og nettverkstedet vil endres til 802,11. Sikkerhetmoden (6GHz) vil endres til WPA3-SAE (SAE). You will need to reconnect the Wi-Fi devices which were connect to the others Wi-Fi frequency band. Fortsett?
mlo_wifi5_on_info = Wi-Fi 7 MLO has been turned on. If you want to turn on Wi-Fi 5 compatibility mode, please turn off MLO.
mlo_no_be_info = Wi-Fi7 funksjon MLO er slått på, og bare 802,11BE kan brukes.
mlo_off_info = For nettverkskompatibilitet vil nettverksmoden 2,4GHz og 5GHz endres til 802,11 aks, alle forbundede enheter vil kobles igjen etter at Wi-Fi starter på nytt. Fortsett?
band_steering_intro_info_new = Ved skrudd vil optimal frekvenstilgang automatisk velges under tilgang.

