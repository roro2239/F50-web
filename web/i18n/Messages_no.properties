faq_index_indicator_title = Hva definerer indikatorlyset?
faq_index_mesh_problem_step_1 = 1. Kunne ikke opprette et maskenettverk?
faq_index_mesh_problem_step_1_explain = For å opprette et maskenettverk må du sørge for å oppfylle følgende betingelser:<br/>1) To enheter skal ikke være for langt unna hverandre (1-3 meter). Når du har opprettet Wi-Fi-maskenettverket, plasserer du enheten på et riktig sted i hjemmet. Kontroller <a href="#mesh_device_list">My Mesh-enhetene</a> for å se maskenettverket. Hvis underenheten er for langt unna hovedenheten, vil ytelsen til maskenettverket i hjemmet forringes.<br/>2) Den nye enheten som brukes som underenhet, må ikke angis (gjelder bare fabrikkinnstillinger). Hvis enheten er innstilt, må du tilbakestille den til fabrikkinnstillingene før du oppretter maskenettverk.<br/>3) Trykk på WPS-knappen på hver enhet og indikatorlampen blinker.
faq_index_mesh_problem_step_2 = 2. Hvor lang tid tar det å opprette et maskenettverk? Hvordan vet jeg at et maskenettverk er vellykket opprettet?
faq_index_mesh_problem_step_2_explain = Det kan ta 2 til 3 minutter før enhetens indikatorlampe fortsetter å blinke hvitt. Når enheten er i maskenettverk, lyser nettverksindikatorlyset på vanlig måte. Du kan også vise maskeenheter i <a href="#mesh_building">topologivisning</a> på den tilsvarende skjermen.
faq_index_mesh_problem_step_3 = 3. To maskeenheter er langt unna hverandre?
faq_index_mesh_problem_step_3_explain = Prøv en av følgende metoder:<br/>1) Legg til flere maskeenheter for å opprette maskenettverk (du må kjøpe ekstra enheter).<br/>2) Hvis det ikke er flere enheter i maskenettverket, kan du bruke en nettverkskabel til å koble til LAN-porten på hovednettenheten og en hvilken som helst nettverksport på underenheten for å sikre stabil dataoverføring mellom de to enhetene.
faq_index_mesh_problem_step_4 = 4. Hva skal vi gjøre i følgende tilfeller etter at nettverket er vellykket?
faq_index_mesh_problem_step_4_explain = 1) Når maskenettverket er opprettet, kan de forstyrre hverandre hvis avstanden mellom to enheter er for nær. I dette tilfellet skal underenheten plasseres minst én meter unna hovedenheten.<br/>2) Når maskenettverket er opprettet, kan du ikke få tilgang til nettverket hvis underenheten er utenfor maskenettverket. Hvis du vil bruke enheten, må du legge den til i det eksisterende maskenettverket igjen eller tilbakestille den til fabrikkinnstillingene og deretter opprette et annet maskenettverk.<br/>3) Når maskenettverket er opprettet, deler enheter i maskenettverket de samme Wi-Fi-parameterne, og Wi-Fi-enheter i hjemmet ditt kobles til en nærliggende maskeenhet. Hvis det oppstår feil på underenheten og indikatorlyset blir rødt, vil underenhetens Wi-Fi være utilgjengelig, og Wi-Fi-enheter i hjemmet ditt vil koble til en annen tilgjengelig maskeenhet i nærheten. Det anbefales å korrigere underenhetens Wi-Fi-tilkoblingsproblem som påvirker Wi-Fi i hjemmet ditt ved hjelp av erfaring. = Kontroller nettverket i følgende trinn:<br/>1. Kontroller kabeltilkoblingen til ruterens nettverk.<br/>2. Kontroller enhetens nettverksparametere i <a href="#internet_setting">Tilkoblingsinnstillinger </a>.
