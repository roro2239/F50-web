mesh_faq_intro_information1 = 1.为什么会组网失败？
mesh_faq_intro_information1_sub1 = 请确保要组网的两台设备距离不要太远（5米内），并在一个房间或空间。
mesh_faq_intro_information1_sub2 = 购买的要加入组网网络的设备需要在出厂状态下，如果该设备被配置过，请先恢复出厂设置再开始组网。
mesh_faq_intro_information1_sub3 = 请确保按下wps按键并且看到设备指示灯或者Wi-Fi指示灯闪烁。
mesh_faq_intro_information1_sub4 = 如果你的设备是中兴通讯设备，将提升组网的成功率。
mesh_faq_intro_information2 = 2.组网大概需要多久？如何判断组网成功？
mesh_faq_intro_information2_sub1 = 组网大概需要持续2~3分钟，该过程设备指示灯或者Wi-Fi指示灯会持续闪烁，当设备加入网络成功，设备的网络灯会正常亮起，你也也可以通过UI查看网络拓扑图查看加入的 Mesh节点设备。
mesh_faq_intro_information3 = 3.为什么wifi灯是粉色或者紫色？
mesh_faq_intro_information3_sub1 = 组网成功后，如果当前设备距离家里的主节点设备（连接入户网络的设备）比较远，导致连接的信号不好，请调整该设备位置，直到指示灯变成白色。
mesh_faq_intro_information4 = 4.如果组网的两台设备不能在有效距离内该怎么办？
mesh_faq_intro_information4_sub1 = 购买更多的Mesh设备参与组网。
mesh_faq_intro_information4_sub2 = 您可以尝试通过网线连接主节点设备的LAN口到组网子节点设备
mesh_faq_intro_information5 = 5.我的设备无法正常工作。
mesh_faq_intro_information5_sub1 = 确保所连接的充电器是原装的。
mesh_faq_intro_information5_sub2 = 检查软件版本并将软件升级到最新版本。
