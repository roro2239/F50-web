faq_index_create_mesh_step_1 = 使用中兴设备搭建家庭Wi-Fi Mesh网络，实现家庭Wi-Fi全覆盖。
faq_index_create_mesh_step_2 = 1. 设备需具有Wi-Fi Mesh 功能。组网时，两台设备尽量互相靠近；组网后，将设备摆放到合适位置。在组网中有上网配置的设备称为主设备，组网中的其余设备称为子设备。
faq_index_create_mesh_step_3 = 2. 组网成功后，如果设备指示灯变为红色：
faq_index_create_mesh_step_4 = <br/>&nbsp;&nbsp;(1) 打开WebUI，查看组网状态。如果主设备指示灯是红色，请参考【常见问题】的“设备无法上网”？
faq_index_create_mesh_step_5 = <br/>&nbsp;&nbsp;(2) 如果只是子设备指示灯是红色，请确认此设备是否脱离组网范围（以<a href="#mesh_building">网络拓扑图</a>查看Mesh设备）。如果脱离组网范围，请将子设备拿到主设备附近（5 米以内即可），然后按下WPS按钮再次尝试连接主设备。
faq_index_create_mesh_step_6 = <br/>&nbsp;&nbsp;(3) 如果连接主设备失败，请将子设备恢复出厂设置。（注意：对于只需和家中已有中兴路由器组网的设备来说，无需进行初始化设置，因为设备恢复出厂设置后即可自动组网）。
faq_index_create_mesh_step_7 = <br/>3. 组网成功后，如果子设备脱离组网范围，您无法使用此设备访问网络。要使用此设备，请将其放回原有组网范围或者恢复出厂设置后重新组网。
faq_index_create_mesh_step_8 = 组网成功后，组网中的设备使用相同的Wi-Fi参数，您家中的Wi-Fi设备会就近连接Mesh设备。如果子设备自身出现故障，指示灯变为红色，这表示子设备的Wi-Fi无法使用，您家中的Wi-Fi设备会就近连接其他可用的Mesh设备。建议您尽快修复子设备的Wi-Fi网络连接故障，此故障会影响您的家庭Wi-Fi使用体验。
faq_index_create_mesh_title = ZTE Wi-Fi Mesh网络创建
faq_index_forget_login_password_step_1 = 在WebUI管理设备时，如果忘记设备登录密码，请长按设备的Reset（重置）按键直至指示灯闪烁。此时设备已恢复出厂设置，您可以输入默认密码管理设备（默认密码打印在设备标签上）。部分设备无需输入密码，直接登录并重新配置。
faq_index_forget_login_password_step_2 = 重置过后，您所配置过的参数将被恢复为出厂值。建议再次配置的Wi-Fi参数和之前的配置保持一致，以保证您家中现有的Wi-Fi设备可以正常自动接入。
faq_index_forget_login_password_title = 忘记设备的登录密码？
faq_index_forget_wifi_password_step_1 = 通过网线连接设备访问WebUI管理页面，在<a href="#wifi_main_ssid">Wi-Fi设置</a>页面查看设备的Wi-Fi密码。
faq_index_forget_wifi_password_title = 忘记设备Wi-Fi密码？
faq_index_hardware_button_step_1 = 1. Reset（重置）按键：如果忘记密码，长按此按键可以将设备恢复出厂设置。默认出厂配置可以在设备标签上查看。
faq_index_hardware_button_step_2 = 2. WPS按键：设备未设置时（采用默认出厂设置），此按键仅用于Mesh设备配对；设备已设置时，此按键可以用于Mesh设备配对和WPS连接。
faq_index_hardware_button_title = 设备按键怎么用？
faq_index_indicator_step_1 = 红色闪烁：设备启动中或正在恢复出厂设置；<br/>红色常亮：设备启动完成，WAN未联网或未进行初始化配置；<br/>白色闪烁：Mesh组网中或WPS开启；<br/>白色常亮：设备启动完成，WAN已联网；<br/>灭：未连接电源适配器；
faq_index_indicator_step_2 = 备注：<br/>1. 红灯常亮，需检查设备的网络连接状态。请参考【常见问题】"设备无法上网？"
faq_index_indicator_step_3 = 2. 如果这是您的第二台 路由器设备，并且用于组成家庭Wi-Fi Mesh网络，加入过程白灯闪烁，加入成功后，指示灯停止闪烁；加入失败，仍旧常亮红色。如果连续两次组网失败，请恢复设备为出厂状态，然后再次尝试组网。
faq_index_indicator_title = 指示灯定义是怎样的？
faq_index_mesh_problem_step_1 = 1. 为什么组网失败？
faq_index_mesh_problem_step_1_explain = 要成功组网，请确保满足以下条件：<br/>1) 要组网的两台设备之间距离不要太远（建议1~3米）。组网成功后，再将设备放置到家庭合适的位置。放置后通过<a href="#mesh_device_list">我的Mesh设备</a>查看组网结果，如果子设备和主设备距离太远会导致家庭Mesh网络性能变差。<br/>2) 用作子设备的新设备必须处于出厂默认状态。如果设备已设置，请先恢复出厂设置然后组网。<br/>3) 按下设备的WPS按钮并且能看到指示灯闪烁。
faq_index_mesh_problem_step_2 = 2. 组网需要多久？如何知道组网成功？
faq_index_mesh_problem_step_2_explain = 组网大概需要持续2~3分钟，该过程设备灯持续闪烁，当设备加入网络成功，设备的灯会正常亮起，或者通过WebUI<a href="#mesh_building">网络拓扑图</a>查看加入的Mesh节点设备。
faq_index_mesh_problem_step_3 = 3. 如果组网的两台设备不能在有效距离内怎么办？
faq_index_mesh_problem_step_3_explain = 可尝试以下任意方法：<br/>1) 将更多Mesh设备纳入组网（额外设备需自行购买）。<br/>2) 如果已经组网没有更多的设备，可使用网线直接连接Mesh主设备的LAN口和子设备的任意网口，可以保证两台设备数据稳定传输。
faq_index_mesh_problem_step_4 = 4. 组网成功后遇到如下情况怎么处理？
faq_index_mesh_problem_step_4_explain = 1) Mesh组网成功后，两台设备距离太近可能会相互干扰，请将子设备放到距离主设备1米以上的位置。<br/>2) Mesh组网成功后，子设备如果被单独拿走，是无法独立上网使用的，只有回归到原先的Mesh网络，或者恢复出厂在新的环境中使用或重新加入新的Mesh网络。<br/>3) Mesh组网成功后，家庭全覆盖的Wi-Fi参数是相同的，您的家庭Wi-Fi设备会就近接入附近的节点，但如果子设备因为自身的故障变成红色，该子设备的Wi-Fi将无法使用，您家庭Wi-Fi接入设备会找到就近的一个Mesh设备接入，但如果因为距离太远可能会影响家庭Wi-Fi接入体验，所以建议还是尽快解决。
faq_index_mesh_problem_title = Wi-Fi Mesh组网相关问题
faq_index_no_network_step_1 = 按以下步骤检查您的网络：<br/>1. 路由器的网线连接是否正常。<br/>2. 前往<a href="#internet_setting">联网设置</a>检查设备的网络参数。
faq_index_no_network_step_2 = 检查设备的网络参数：<br/>【如果设备连接了运营商网络】<br/>&bull; 需要帐号和密码时：将上网方式设置为PPPoE并输入运营商提供的参数。<br/>&bull; 无需帐号和密码时：将上网方式设置为DHCP。<br/>如果输入了正确的参数，但还是无法上网，请联系您的运营商。
faq_index_no_network_step_3 = 【如果设备连接了已有路由器，将上网方式设置为 DHCP】<br/>如果选择了 DHCP，但还是无法上网，请检查所连接的家庭网络的子网地址是否与设备地址相同（设备地址打印在设备标签上）。例如：如果设备地址是 192.168.0.1，家庭网络的子网地址也是 192.168.0.1，您就可以访问网址 http://192.168.0.1 并登录设备的 WebUI，在高级设置 > 路由 > <a href="#lan_setting">基本设置</a>中更改设备的网关地址或者更改家庭网络的网关地址。
faq_index_no_network_step_4 = 如果设备仍旧无法上网，请尝试以下任意方法：<br/>1. 重启设备。<br/>2. 将设备<a href="#restore">恢复出厂</a>设置，然后按照引导重新设置设备。
faq_index_no_network_title = 设备无法上网？
faq_index_no_wifi_step_1 = 1. 前往<a href="#wifi_main_ssid">Wi-Fi设置</a>页面查看设备的Wi-Fi状态，如果Wi-Fi关闭（无法发现 Wi-Fi 名称），请开启Wi-Fi。
faq_index_no_wifi_step_2 = 2. 路由器可能应用了最新的Wi-Fi协议和安全加密方式。如果接入的设备不是最新型号，请在Wi-Fi设置 中尝试如下操作：<br/>&bull; 前往<a href="#wifi_main_ssid">Wi-Fi设置</a>的安全模式，查看是否有“WPA3”，如果有，请选择其他不包含“WPA3”的鉴权方式。<br/>&bull; 在<a href="#wifi_advance">Wi-Fi->高级设置</a>中开启“Wi-Fi 5 兼容”。
faq_index_no_wifi_step_3 = 3. 检查设备是否离路由器比较远或者周围有两道或者多道墙。如果距离较远或者有两道或多道墙，请移动设备或者调整路由器的摆放位置。如果您的房间面积大，建议再找一台中兴的Mesh路由器以组成家庭Wi-Fi Mesh网络。要了解组网的详细信息，请前往<a href="#mesh_building">Mesh组网</a>页面。
faq_index_no_wifi_step_4 = 4. 在<a href="#station_info">接入设备</a>列表中查看设备状态。如果设备被加入黑名单，请将其移出黑名单。
faq_index_no_wifi_title = 设备无法连接Wi-Fi？
faq_index_redirect_step_1 = 这是由于设备网络连接问题导致的，请按以下步骤检查设备：<br/>1. 检查设备是否可以上网。如果指示灯或者网络指示灯是红色，请参考【常见问题】的“设备无法上网？”。
faq_index_redirect_step_2 = 2. 如果指示灯或者网络指示灯正常，但仍然重定向，请查看其他应用是否可以上网。如果其他应用可以上网，请清除浏览器的缓存或者尝试其他浏览器。<br/>如果问题仍未解决，请联系您的运营商。
faq_index_redirect_title = 在浏览器中输入网址后，为什么总是重定向到设备的管理界面？
faq_index_restore_step_1 = 遇到无法解决的故障时，请尝试以下任意方法恢复出厂设置：<br/>1. 长按设备的Reset（重置）按钮大约3秒钟（这期间设备指示灯会发生变化）。设备重启即表示设备已恢复出厂设置。<br/>2. 在<a href="#restore">恢复出厂</a>中恢复出厂设置。
faq_index_restore_step_2 = 设备重置后，按照开机向导重新设置设备（您需要重新设置 Wi-Fi 参数）。建议您设置的Wi-Fi参数与设备重置前使用的Wi-Fi参数一致，那么之前连接过的Wi-Fi设备会自动重连。
faq_index_restore_title = 如何恢复出厂设置？
