privacy_policy_note_1 = De forma a disponibilizar-lhe o serviço de atualização do sistema do router e garantir que os seus dispositivos funcionam corretamente, é necessário recolher as seguintes informações:
privacy_policy_note_2 = <b>IMEI, SN e versão de software do dispositivo de router</b>.
privacy_policy_note_3 = Pode optar por transferir a versão mais recente e efetuar a atualização de forma a resolver possíveis problemas que o sistema possa ter. Entretanto, pode optar por ativar a funcionalidade de atualização automática para resolver falhas críticas que o sistema possa ter e para atualizar o patch de segurança. Esta funcionalidade está ativada por defeito. Para desativar esta funcionalidade, aceda a Definições avançadas > Atualizar na nossa página de gestão online para a definir. Tenha em atenção que a atualização da versão implica o consumo de dados móveis.
privacy_policy_tro69_note_1 = Para permitir a utilização do CWMP (um protocolo de Internet) para gerir remotamente os seus dispositivos de banda larga móvel, a operadora irá recolher e processar algumas das suas informações pessoais. As suas informações são controladas e processadas pelo seu operador, enquanto a ZTE fornece apenas o dispositivo de banda larga móvel.
privacy_policy_tro69_note_2 = Para obter mais detalhes sobre as suas informações pessoais ou quaisquer perguntas sobre os seus direitos enquanto titular de dados ou sobre o tratamento dos seus dados pessoais através do operador, contacte o mesmo.
