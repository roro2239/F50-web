faq_index_indicator_title = Qual é a definição da luz indicadora?
faq_index_mesh_problem_step_1 = 1. Falha ao formar uma rede em malha?
faq_index_mesh_problem_step_1_explain = Para formar com sucesso uma rede em malha, certifique-se de que cumpre as seguintes condições:<br/>1) Dois dispositivos não devem estar demasiado afastados um do outro (1-3 metros). Depois de criar a rede Wi-Fi em malha, coloque o dispositivo num local adequado na casa. Se o subdispositivo estiver demasiado longe do dispositivo principal, o desempenho da rede em malha doméstica irá deteriorar-se.<br/>2) O novo dispositivo que é utilizado como subdispositivo não deve ser definido (aplica-se apenas às predefinições de fábrica). Se o dispositivo estiver definido, reponha-o para as predefinições de fábrica antes de formar uma rede em malha.<br/>3) Prima o botão WPS de cada dispositivo e a luz indicadora fica intermitente.
faq_index_mesh_problem_step_2 = 2. Quanto tempo demora a formar uma rede em malha? Como sei que uma rede em malha foi formada com sucesso?
faq_index_mesh_problem_step_2_explain = Pode demorar de 2 a 3 minutos, durante os quais a luz indicadora Wi-Fi dos dispositivos continua a piscar. Quando o dispositivo está na rede em malha, a sua luz indicadora de rede acender-se-á normalmente; também pode ver dispositivos de rede em malha na <a href="#mesh_building">vista de topologia</a> no ecrã correspondente.
faq_index_mesh_problem_step_3 = 3. Existem dois dispositivos de rede em malha distantes um do outro?
faq_index_mesh_problem_step_3_explain = Experimente qualquer um dos seguintes métodos:<br/>1) Adicione mais dispositivos de rede para formar uma rede em malha (necessita de comprar dispositivos extra).<br/>2) Se não existirem mais dispositivos na rede em malha, pode utilizar um cabo de rede para ligar a porta LAN do dispositivo de malha principal e qualquer porta de rede do subdispositivo para garantir a transmissão estável de dados entre os dois dispositivos.
faq_index_mesh_problem_step_4 = 4. O que devemos fazer nos seguintes casos após o sucesso da rede?
faq_index_mesh_problem_step_4_explain = 1) Após a formação da rede em malha, se a distância entre dois dispositivos for demasiado próxima, podem interferir uns com os outros. Neste caso, coloque o subdispositivo a pelo menos um metro de distância do dispositivo principal.<br/>2) Após a formação da rede em malha, se o subdispositivo estiver fora da rede em malha, não poderá aceder à rede. Para utilizar o dispositivo, adicione-o novamente à rede em malha existente ou redefina-o para as predefinições de fábrica e, em seguida, crie outra rede em malha.<br/>3) Com a formação de rede em malha, os dispositivos na rede em malha partilham os mesmos parâmetros Wi-Fi e os dispositivos Wi-Fi em sua casa ligar-se-ão a um dispositivo de malha nas proximidades. Se ocorrer uma falha no subdispositivo e a luz indicadora ficar vermelha, o Wi-Fi dos subdispositivos ficará indisponível e os dispositivos Wi-Fi em sua casa ligar-se-ão a outro dispositivo de rede em malha disponível nas proximidades. Aconselhamos a corrigir o problema de ligação Wi-Fi dos subdispositivos que afeta a sua experiência de utilização de Wi-Fi doméstica. Verifique a sua rede nos seguintes passos:<br/>1. Verifique a ligação do cabo de rede dos routers.<br/>2. Verifique os parâmetros de rede do dispositivo em Definições de <a href="#internet_setting">ligação</a>.
