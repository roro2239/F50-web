mesh_network_abnormal_wifi_set_confirm = A mesh Wi-Fi foi criada, se alguns dos dispositivos mesh secundários estiverem offline, a alteração dos parâmetros não será sincronizada e, quando o dispositivo offline estiver online, poderá premir o botão WPS para adicionar novamente o dispositivo mesh secundário à rede mesh. Continuar?
mesh_network_deploying_title = A configurar...
mesh_network_fota_update_mainnode = Atualize o dispositivo mesh secundário o mais rápido possível, caso contrário, ele pode colocar a transferência em pausa ou atualizar quando o dispositivo mesh principal estiver a ser atualizado.
