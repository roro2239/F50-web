key_log_setting_note = Política de Privacidade do Plano de Melhoria Pós-venda do Router Inteligente da ZTE. Para fornecer melhores serviços e experiência, recomendamos que adira a este plano de melhoria pós-venda.
key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de Privacidade do Plano de Melhoria Pós-venda do Router Inteligente da ZTE</a>.
key_log_setting_note_6 = Para fornecer melhores serviços e experiência, recomendamos que adira a este plano de melhoria pós-venda.
key_log_switch_note_1 = Para localizar melhor os possíveis problemas do seu router e garantir o funcionamento normal e estável do seu router, iremos recolher algumas das informações chave de registo do seu dispositivo, tais como: ativação e desativação de WiFi, ação de registo bem-sucedida, força do sinal, alteração do tipo de rede, transferência de CELL, queda de rede, ligação e desconexão de PDP, execução anormal de Wi-Fi, ação de reinício, ação de início e fim FOTA, ligação de cabos de rede. <br/>Estas informações serão exportadas quando o seu dispositivo for enviado para o centro de pós-venda se ativar esta função. O dispositivo armazenará informações chave de registo, principalmente dados em execução, durante aproximadamente 1 mês. Os dados só estarão disponíveis para transferência durante o serviço pós-venda para ajudar na depuração de problemas. Se necessário, os dados podem ser transferidos de forma segura da Áustria para a China, para análise adicional. No entanto, assim que o problema for resolvido, os dados serão imediatamente eliminados para garantir a privacidade e a proteção de dados.
key_log_switch_note_2 = Para mais conteúdos sobre proteção de privacidade, consulte a Política de Privacidade do Plano de Melhoria Pós-venda do Router Inteligente <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >ZTE</a>.<br/>Para fornecer melhores serviços e experiência, recomendamos que adira a este plano de melhoria pós-venda.
