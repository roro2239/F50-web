faq_index_indicator_title = Qual é a definição da luz indicadora?
faq_index_mesh_problem_step_1 = 1. Falha ao formar uma rede de malha?
faq_index_mesh_problem_step_1_explain = Para formar a rede de malha com sucesso, certifique-se de atender às seguintes condições:<br/>1) Dois dispositivos não devem estar muito distantes um do outro (1 a 3 metros). Depois de criar a rede de malha WiFi, coloque o dispositivo em um local adequado na casa. Se o subdispositivo estiver muito longe do dispositivo principal, o desempenho da rede de malha doméstica se deteriorará.<br/>2) O novo dispositivo usado como subdispositivo não deve ser definido (aplica-se apenas aos padrões de fábrica). Se o dispositivo estiver definido, redefina-o para os padrões de fábrica antes de formar a rede de malha.<br/>3) Pressione o botão WPS de cada dispositivo e a luz indicadora piscará.
faq_index_mesh_problem_step_2 = 2. Quanto tempo leva para formar uma rede de malha? Como sei que uma rede de malha é formada com sucesso?
faq_index_mesh_problem_step_2_explain = Pode levar de 2 a 3 minutos, durante os quais a luz indicadora do dispositivo continua piscando branco. Quando o dispositivo estiver em rede de malha, sua luz indicadora de rede acenderá normalmente; você também pode visualizar os dispositivos de malha na <a href="#mesh_building">visualização de topologia</a> na tela correspondente.
faq_index_mesh_problem_step_3 = 3. Dois dispositivos de malha estão longe um do outro?
faq_index_mesh_problem_step_3_explain = Tente qualquer um dos seguintes métodos:<br/>1) Adicione mais dispositivos de malha para formar rede de malha (você precisa comprar dispositivos extras).<br/>2) Se não houver mais dispositivos na rede de malha, você pode usar um cabo de rede para conectar a porta LAN do dispositivo de malha principal e qualquer porta de rede do subdispositivo para garantir a transmissão estável de dados entre os dois dispositivos.
faq_index_mesh_problem_step_4 = 4. O que devemos fazer nos seguintes casos após o sucesso da rede?
faq_index_mesh_problem_step_4_explain = 1) Após a rede de malha ser formada, se a distância entre dois dispositivos for muito próxima, eles podem interferir uns com os outros. Neste caso, coloque o subdispositivo a pelo menos um metro de distância do dispositivo principal.<br/>2) Depois que a rede de malha for formada, se o subdispositivo estiver fora da rede de malha, você não poderá acessar a rede. Para usar o dispositivo, adicione-o à rede de malha existente novamente ou redefina-o para os padrões de fábrica e, em seguida, forme outra rede de malha.<br/>3) Com a rede de malha formada, os dispositivos na rede de malha compartilham os mesmos parâmetros Wi-Fi e os dispositivos Wi-Fi em sua casa se conectarão a um dispositivo de malha próximo. Se ocorrer uma falha no subdispositivo e sua luz indicadora ficar vermelha, o Wi-Fi do subdispositivo ficará indisponível e os dispositivos Wi-Fi em sua casa se conectarão a outro dispositivo de malha disponível nas proximidades. É aconselhável corrigir o problema de conexão Wi-Fi do subdispositivo que afeta o Wi-Fi de sua casa usando a experiência. Verifique sua rede nas seguintes etapas:<br/>1. Verifique a conexão do cabo de rede do roteador.<br/>2. Verifique os parâmetros de rede do dispositivo em <a href="#internet_setting">Configurações de conexão</a>.
