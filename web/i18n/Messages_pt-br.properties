key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de privacidade do plano de melhoria pós-venda do roteador inteligente ZTE</a>.
key_log_setting_note_6 = Para fornecer melhores serviços e experiência, recomendamos que você participe deste plano de melhoria pós-venda.
key_log_switch_note_1 = Para localizar melhor os possíveis problemas do roteador e garantir a operação normal e estável do roteador, coletaremos algumas informações de registro de chave do dispositivo, como: ativação e desativação do Wi-Fi, ação bem-sucedida do registro, força do sinal, alteração do tipo de rede, transição entre células, queda da rede, conexão e desconexão do PDP [Packet Data Protocol (Protocolo de Dados de Pacote)], Wi-Fi em execução anormal, ação de reinicialização, ação de início e término do FOTA [Firmware Over-The-Air (Firmware aéreo)] e conexão do cabo de rede. <br/>Essas informações serão exportadas quando o dispositivo for enviado para o centro de pós-venda se você ativar essa função. O dispositivo armazenará informações importantes de registro, principalmente dados em execução, por aproximadamente um mês. Os dados só estarão disponíveis para download durante o serviço pós-venda para ajudar na depuração de problemas. Se necessário, os dados podem ser transferidos com segurança da Áustria para a China para análise adicional. No entanto, assim que o problema for resolvido, os dados serão imediatamente excluídos para garantir a privacidade e a proteção deles.
key_log_switch_note_2 = Para obter mais conteúdo sobre proteção de privacidade, consulte a <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de privacidade do Plano de melhoria pós-venda do Smart Router da ZTE</a>.<br/>Para fornecer melhores serviços e experiência, recomendamos que você participe deste plano de melhoria pós-venda.
