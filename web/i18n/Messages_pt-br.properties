privacy_policy = Política de privacidade
privacy_policy_note_1 = De forma a disponibilizar-lhe o serviço de atualização do sistema do roteador e garantir que os seus dispositivos funcionam corretamente, é necessário recolher as seguintes informações:
privacy_policy_note_2 = <b>IMEI, SN e versão de software do dispositivo de roteador</b>.
privacy_policy_note_3 = É possível optar por baixar a versão mais recente e realizar a atualização para resolver possíveis riscos que o sistema possa ter. Enquanto isso, você pode optar por ativar o recurso de atualização automática para resolver falhas críticas que o sistema possa ter e atualizar o patch de segurança. Esse recurso é ativado por padrão. Para desativar esse recurso, vá para Configurações Avançadas > Atualizar em nossa página de gerenciamento baseada na Web para definir. Além disso, a atualização da versão consumirá dados móveis.
privacy_policy_tro69_note_1 = Para permitir que você use o CWMP (um protocolo de Internet) para gerenciar remotamente seus dispositivos móveis de banda larga, a operadora coletará e processará algumas de suas informações pessoais. Suas informações são controladas e processadas pela operadora, enquanto a ZTE fornece apenas o dispositivo de banda larga móvel.
privacy_policy_tro69_note_2 = Para mais detalhes sobre as suas informações pessoais, ou quaisquer perguntas sobre os seus direitos como titular dos dados ou sobre o processamento dos seus dados pessoais através do operador, contate o seu operador.
