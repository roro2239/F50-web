faq_index_indicator_title = Mikä on merkkivalon merkitys?
faq_index_mesh_problem_step_1 = 1. Eikö mesh-verkkoa voitu muodostaa?
faq_index_mesh_problem_step_1_explain = Jotta mesh-verkko muodostuisi onnistuneesti, varmista, että seuraavat ehdot täyttyvät:<br/>1) Kaksi laitetta ei saa olla liian kaukana toisistaan (1–3 metriä). Kun olet luonut Wi-Fi-mesh-verkon, aseta laite oikeaan paikkaan kotona. Valitse <a href="#mesh_device_list">Omat mesh-verkkolaitteet</a>, niin voit nähdä mesh-verkon. Jos alilaite on liian kaukana päälaitteesta, mesh-kotiverkon suorituskyky heikkenee.<br/>2) Alilaitteena käytettävää uutta laitetta ei saa asettaa (koskee vain tehdasasetuksia). Jos laite on asetettu, palauta se tehdasasetuksiin ennen mesh-verkon muodostamista.<br/>3) Paina kunkin laitteen WPS-painiketta, jolloin merkkivalo vilkkuu.
faq_index_mesh_problem_step_2 = 2. Kuinka kauan mesh-verkon muodostaminen kestää? Mistä tiedän, että mesh-verkko on muodostettu onnistuneesti?
faq_index_mesh_problem_step_2_explain = Se voi kestää 2–3 minuuttia, jona aikana laitteen merkkivalo vilkkuu edelleen valkoisena. Kun laite on mesh-verkossa, sen verkon merkkivalo syttyy normaalisti. Voit myös tarkastella verkkolaitteita <a href="#mesh_building">topologianäkymässä</a> vastaavalla näytöllä.
faq_index_mesh_problem_step_3 = 3. Kaksi mesh-verkkolaitetta on kaukana toisistaan?
faq_index_mesh_problem_step_3_explain = Kokeile jotakin seuraavista menetelmistä:<br/>1) Lisää verkkolaitteita mesh-verkon muodostamiseksi (lisälaitteita on ostettava).<br/>2) Jos mesh-verkossa ei ole enempää laitteita, voit käyttää verkkokaapelia pääverkkolaitteen LAN-portin ja alilaitteen minkä tahansa verkkoportin yhdistämiseen, jotta laitteiden välinen tiedonsiirto olisi vakaata.
faq_index_mesh_problem_step_4 = 4. Mitä meidän pitäisi tehdä seuraavissa tapauksissa, kun verkottuminen on onnistunutta?
faq_index_mesh_problem_step_4_explain = 1) Jos kahden laitteen välinen etäisyys on liian vähäinen mesh-verkon muodostamisen jälkeen, ne saattavat häiritä toisiaan. Aseta tässä tapauksessa alilaite vähintään yhden metrin päähän päälaitteesta.<br/>2) Jos alilaite on mesh-verkon ulkopuolella mesh-verkon muodostamisen jälkeen, verkkoa ei voi käyttää. Käyttääksesi laitetta lisää se uudelleen olemassa olevaan mesh-verkkoon tai palauta se tehdasasetuksiin ja muodosta sitten toinen mesh-verkko.<br/>3) Kun mesh-verkko on muodostettu, mesh-verkon laitteet jakavat samat Wi-Fi-parametrit, ja kotisi Wi-Fi-laitteet muodostavat yhteyden läheiseen mesh-laitteeseen. Jos alilaitteessa on vika ja sen merkkivalo muuttuu punaiseksi, alilaitteen Wi-Fi ei ole käytettävissä, ja kotisi Wi-Fi-laitteet muodostavat yhteyden lähellä olevaan toiseen käytettävissä olevaan mesh-laitteeseen. On suositeltavaa korjata alilaitteen Wi-Fi-yhteysongelma, joka vaikuttaa kotisi Wi-Fi-yhteyden käyttäjäkokemukseen. = Tarkista verkkosi seuraavien vaiheiden mukaan:<br/>1. Tarkista reitittimen verkkokaapelin liitäntä.<br/>2. Tarkista laitteen verkkoparametrit <a href="#internet_setting">Yhteysasetuksista</a>.
