wifi_move_tips = Vinkkejä:<br/>1. Vain 2,4 GHz:n Wi-Fi-nimi ja -salasana voidaan synkronoida.<br/>2. Wi-Fi-parametrien synkronointi kestää useita minuutteja, ja se voi epäonnistua, jos vanhan laitteen kanssa on yhteensopivuusongelma.<br/>3. Paina vanhan laitteen WPS-painiketta ja napsauta sitten ”Aloita siirto”.
