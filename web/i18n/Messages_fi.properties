wifi_off_alert = Voit avata Wi-Fin uudelleen yhdistämällä laitteen tietokoneeseen ja kirjautumalla verkkokäyttöliittymään. Jatketaanko?
wifi_off_alert_with_mesh = Solmuverkko on otettu käyttöön, ja Wi-Fi:n sammuttaminen tarkoittaa, että myös solmuverkko kytkeytyy pois käytöstä. Sinun on yhdistettävä laite tietokoneeseen ja kirjauduttava verkkokäyttöliittymään, jotta voit avata Wi-Fi:n uudelleen. Jatketaanko?
wifi_opti_auto_disable = Nykyinen kanava määritetään manuaalisesti. Automaattinen skannaustoiminto poistetaan käytöstä.
