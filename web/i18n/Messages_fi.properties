mlo_no_be_info = Wi-Fi7-toiminto MLO on päällä, ja vain 802.11BE voidaan käyttää.
mlo_off_info = Verkon yhteensopivuuden vuoksi 2,4 GHz:n ja 5 GHz:n verkkotila muutetaan 802.11 ax:ksi, kaikki liitetyt laitteet yhdistyvät uudelleen, kun Wi-Fi käynnistetään uudelleen. Jatkaa?
