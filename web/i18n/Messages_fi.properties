mlo_switch = MLO
mlo_info = Jos laite on käytössä, laite käyttää MLO-monilinkkiyhteyttä, ja Wi-Fi 7 -käyttölaite valitsee itsenäisesti samanaikaisen taajuusalueen käytön nopeutta ja viivettä vähentääkseen.
band_steering_and_mlo_info = Jos Single SSID tai MLO on käytössä, laitteen taajuudet toimivat edelleen samanaikaisesti ja Wi-Fi-verkon nimi yhdistetään ja näytetään. Jos Single SSID ja MLO on poistettu käytöstä, sinun on määritettävä kunkin taajuusalueen Wi-Fi-verkon nimi erikseen.
