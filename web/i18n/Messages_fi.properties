privacy_policy = Tietosuojakäytäntö
privacy_policy_note_1 = Seuraavat tiedot on kerättävä, jotta voisimme tarjota sinulle reititinjärjestelmän päivityspalvelun ja varmistaa, että reititinlaitteet toimivat oikein.
privacy_policy_note_2 = <b>Reititinlaitteen IMEI- ja SN-numero sekä ohjelmistoversio.</b>
privacy_policy_note_3 = Voit halutessasi ladata uusimman version ja suorittaa päivityksen järjestelmän mahdollisen riskin ratkaisemiseksi. Samalla voit valita ottaaksesi käyttöön automaattisen päivityksen ratkaistaksesi järjestelmässä mahdollisesti olevat kriittiset viat ja päivittääksesi tietoturvakorjauksen. Tämä ominaisuus on otettu käyttöön oletusarvoisesti. Poista tämä ominaisuus käytöstä siirtymällä kohtaan Lisäasetukset > Päivitä verkkopohjaisella hallintasivullamme asettaaksesi sen. Huomaathan, että version päivitys kuluttaa mobiilidataa.
privacy_policy_tro69_note_1 = Jotta voit käyttää CWMP:tä (Internet-protokollaa) mobiililaajakaistalaitteiden etähallintaan, operaattori kerää ja käsittelee joitakin henkilökohtaisia tietojasi. Operaattori hallitsee ja käsittelee tietojasi, kun taas ZTE tarjoaa vain mobiililaajakaistalaitteen.
privacy_policy_tro69_note_2 = Jos haluat lisätietoja henkilökohtaisista tiedoistasi tai kysymyksiä oikeuksistasi rekisteröitynä tai henkilötietojesi käsittelystä operaattorin kautta, ota yhteyttä operaattoriin.
