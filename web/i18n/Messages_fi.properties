wifi_opti_note_channel_list = Kanavaluettelo: Näyttää luettelon kaikista kanavista tarkistuksen jälkeen. Jos käyttäjä klikkaa kanavapalkkia, rivi laajenee ja näyttää kaikki kanavan tukiasemat.
wifi_opti_note_interference_tips = Väriruutu: osoittaa kanavan häiriötilan.
wifi_opti_note_mild_interference = Hyvä kanava tarkoittaa, että siinä on vähän häiriöitä.
wifi_opti_note_mod_interference = Huonossa kanavassa on paljon häiriöitä, ja jos se on laitteen senhetkinen kanava, käyttäjää kehotetaan optimoimaan verkko.
