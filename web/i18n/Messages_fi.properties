wifi_opti_single_ssid_info = Kun yksittäinen SSID on käytössä, vain Wi-Fin nimi (SSID) yhdistetään, ja 2,4 GHz:n taajuusalueen ja 5 GHz:n taajuusalueen Wi-Fi-kanavan optimoinnit ovat edelleen voimassa. "
