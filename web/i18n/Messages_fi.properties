mlo_open_info = Laite käyttää 2,4 GHz:n verkkoparametreja, jotka on asetettu, ja verkkotila muutetaan 802.11 be:ksi. Sinun on liitettävä uudelleen Wi-Fi-laitteet, jotka on yhdistetty muihin Wi-Fi-taajuusalueisiin. Jatkaa?
mlo_open_info_owe = Laite käyttää 2,4 GHz:n verkkoparametreja, jotka on asetettu, ja verkkotila muutetaan 802.11 be:ksi ja suojaustila (6 GHz) WPA3-SAE:ksi (SAE). Sinun on yhdistettävä uudelleen Wi-Fi-laitteet, jotka on yhdistetty muihin Wi-Fi-taajuusalueisiin. Jatka?
