wifi_move_fail = Synkronointi epäonnistui, mikä voi johtua seuraavista syistä:<br/>1. Vanhan laitteen Wi-Fi-suojaustila on WPA3 tai WPA2/WPA3.<br/>2. Vanhan laitteen Wi-Fi on AVOIN tai verkkonimi tai salasana on liian pitkä.<br/>3. Et ole painanut vanhan laitteen WPS-painiketta ja uuden laitteen WPS-painiketta 2 minuutin kuluessa.<br/>4. Ympäristö vaikuttaa Wi-Fi-verkkoon.
