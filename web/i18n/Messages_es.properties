usb_internet_protocol_info = Se recomienda mantener el estado automático predeterminado. Si el NIC USB no puede ser identificado correctamente o tienes requisitos especiales, puedes configurarlo manualmente. Se recomienda utilizar RNDIS en sistemas Windows y CDC-ECM en otros sistemas.
samba_setting = Compartir Archivos
samba = Compartir Archivos
samba_setting_tips = Después de activar la función de compartición de archivos, los terminales conectados a este dispositivo a través de USB o Wi-Fi pueden acceder a los archivos compartidos de este dispositivo a través de carpetas compartidas.
samba_setting_ex = Ejemplos de visualización de los archivos compartidos:
samba_setting_ex_windows = PC con Windows: Conéctese al dispositivo -> Columna de dirección en Mi PC -> Ingrese la dirección del dispositivo (predeterminada: \\\\192.168.0.1) -> Presione la tecla Envío -> Visualice los archivos compartidos.
samba_setting_ex_mac = Ordenador Mac: Conéctese al dispositivo -> Ir -> Conectarse al servidor -> Ingrese la dirección del dispositivo (predeterminada: 192.168.0.1) -> Conectar -> Visualice los archivos compartidos.
samba_setting_ex_android = Móvil Android: Conéctese al dispositivo -> Abra navegador de archivos -> Red -> LAN -> Nuevo -> Ingrese la dirección del dispositivo (predeterminada: 192.168.0.1) -> Conectar -> Visualice los archivos compartidos.
samba_setting_ex_ios = Móvil iOS: Conéctese al dispositivo -> Archivos -> Compartir -> Conectarse al servidor -> Ingrese la dirección del dispositivo (predeterminada: 192.168.0.1) -> Conectar -> Visualice los archivos compartidos.