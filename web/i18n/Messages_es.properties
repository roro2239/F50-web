faq_index_indicator_title = ¿Qué define la luz indicadora?
faq_index_mesh_problem_step_1 = 1. ¿Error al formar una red en malla?
faq_index_mesh_problem_step_1_explain = Para formar correctamente la red en malla, asegúrese de cumplir las siguientes condiciones:<br/>1) Dos dispositivos no deben estar demasiado lejos entre sí (1-3 metros). Después de crear la red de malla Wi-Fi, coloque el dispositivo en una ubicación adecuada en el hogar. Si el dispositivo secundario está demasiado lejos del dispositivo principal, el rendimiento de la red de malla doméstica se deteriorará.<br/>2) El nuevo dispositivo que se usa como dispositivo secundario no debe configurarse (solo aplica los valores predeterminados de fábrica). Si el dispositivo está configurado, restablezca los valores predeterminados de fábrica antes de formar la red en malla.<br/>3) Pulse el botón WPS de cada dispositivo y el indicador luminoso parpadeará.
faq_index_mesh_problem_step_2 = 2. ¿Cuánto tiempo se tarda en formar una red en malla? ¿Cómo sé que una red en malla se ha formado correctamente?
faq_index_mesh_problem_step_2_explain = Puede tardar de 2 a 3 minutos, durante los cuales el indicador luminoso del dispositivo sigue parpadeando en color blanco. Cuando el dispositivo está en la red en malla, su luz indicadora de red se iluminará de forma normal; también puede ver los dispositivos en malla en la <a href="#mesh_building">vista de topología</a> en la pantalla correspondiente.
faq_index_mesh_problem_step_3 = 3. ¿Hay dos dispositivos de malla alejados entre sí?
faq_index_mesh_problem_step_3_explain = Pruebe cualquiera de los siguientes métodos:<br/>1) Añada más dispositivos de malla para formar una red de malla (necesita comprar dispositivos adicionales).<br/>2) Si no hay más dispositivos en la red de malla, puede usar un cable de red para conectar el puerto LAN del dispositivo de malla principal y cualquier puerto de red del dispositivo secundario para garantizar una transmisión de datos estable entre ambos dispositivos.
faq_index_mesh_problem_step_4 = 4. ¿Qué debemos hacer en los siguientes casos después de que la red esté correcta?
faq_index_mesh_problem_step_4_explain = 1) Una vez formada la red en malla, si la distancia entre dos dispositivos es demasiado cercana, pueden interferir entre sí. En este caso, coloque el dispositivo secundario al menos a un metro del dispositivo principal.<br/>2) Una vez formada la red en malla, si el dispositivo secundario está fuera de la red en malla, no podrá acceder a la red. Para utilizar el dispositivo, vuelva a añadirlo a la red en malla existente o restablezca los valores predeterminados de fábrica y, a continuación, forme otra red en malla.<br/>3) Con la red en malla formada, los dispositivos en red en malla comparten los mismos parámetros de Wi-Fi, y los dispositivos Wi-Fi de su hogar se conectarán a un dispositivo en malla cercano. Si se produce un fallo del dispositivo secundario y su luz indicadora se vuelve de color rojo, el Wi-Fi del dispositivo secundario no estará disponible y los dispositivos Wi-Fi de su casa se conectarán a otro dispositivo de malla disponible en las cercanías. Se recomienda usar su experiencia para solucionar el problema de conexión Wi-Fi del dispositivo secundario que afecta a la conexión Wi-Fi de su hogar. Compruebe su red siguiendo estos pasos:<br/>1. Compruebe la conexión del cable de red del router.<br/>2. Compruebe los parámetros de red del dispositivo en <a href="#internet_setting">Configuración de conexión</a>.
