key_log_setting_note = Política de privacidad del plan de mejora posventa de ZTE Smart Router. Para proporcionar mejores servicios y experiencia, le recomendamos que participe en este plan de mejora posventa.
key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de privacidad del plan de mejora posventa del ZTE Smart Router</a>.
key_log_setting_note_6 = Para proporcionar mejores servicios y experiencia, le recomendamos que participe en este plan de mejora posventa.
key_log_switch_note_1 = Con el fin de localizar mejor los posibles problemas de su router y garantizar el funcionamiento normal y estable de su router, recopilaremos parte de la información de registro clave de su dispositivo, como: activación y desactivación de wifi, acción de registro correcta, intensidad de la señal, cambio de tipo de red, transferencia de CELL, red de bajada, conexión y desconexión PDP, funcionamiento anómalo de Wi-Fi, acción de reinicio, acción de inicio y finalización de FOTA, conexión de cable de red. <br/>Esta información se exportará cuando su dispositivo se envíe al centro de posventa si habilita esta función. El dispositivo almacenará información de registro clave, principalmente datos en ejecución, durante aproximadamente 1 mes. Los datos solo estarán disponibles para su descarga durante el servicio posventa para ayudar en la depuración de problemas. Si es necesario, los datos pueden transferirse de forma segura de Austria a China para su posterior análisis. Sin embargo, una vez resuelto el problema, los datos se eliminarán inmediatamente para garantizar la privacidad y la protección de datos.
key_log_switch_note_2 = Para obtener más información sobre la protección de la privacidad, consulte la <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Política de privacidad del Plan de mejora posventa del ZTE Smart Router</a>.<br/>Para proporcionar mejores servicios y experiencia, le recomendamos que participe en este plan de mejora posventa.
