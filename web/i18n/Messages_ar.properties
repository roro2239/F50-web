key_log_switch_note_1 = من أجل تحديد المشكلات المحتملة لجهاز التوجيه لديك بشكل أفضل وضمان التشغيل العادي والمستقر لجهاز التوجيه لديك، سنجمع بعض معلومات سجل مفتاح جهازك مثل: تمكين شبكة WiFi وتعطيلها، وإجراءات التسجيل الناجحة، وقوة الإشارة، وتغيير نوع الشبكة، والتسليم الخلوي، وإسقاط الشبكة، واتصال PDP وقطع الاتصال، وتشغيل شبكة WiFi بشكل غير طبيعي، وإجراء إعادة التشغيل، وبدء وإنهاء إجراء FOTA، وتوصيل كابل الشبكة. <br/>سيتم تصدير هذه المعلومات عندما يتم إرسال جهازك إلى مركز ما بعد البيع إذا قمت بتمكين هذه الوظيفة. سيخزّن الجهاز معلومات سجل المفاتيح، وتشغيل البيانات بشكل أساسي، لمدة شهر واحد تقريبًا. لن تكون البيانات متاحة للتنزيل إلا في أثناء خدمة ما بعد البيع للمساعدة في تصحيح المشكلات. قد يتم نقل البيانات بشكل آمن من النمسا إلى الصين لمزيد من التحليل، إذا لزم الأمر. ومع ذلك، بمجرد حلّ المشكلة، سيتم حذف البيانات على الفور لضمان الخصوصية وحماية البيانات.
key_log_switch_note_2 = لمزيد من محتويات حماية الخصوصية، راجع <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >سياسة خصوصية خطة تحسين ما بعد البيع الخاصة بجهاز ZTE Smart Router</a>.<br/>لتقديم خدمات وتجربة أفضل، نوصيك بالانضمام إلى خطة تحسين ما بعد البيع هذه.
