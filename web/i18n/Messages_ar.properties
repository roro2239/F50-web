privacy_policy = سياسة الخصوصية
privacy_policy_note_1 = لتزويدك بخدمة تحديث نظام جهاز التوجيه وللتأكد من عمل أجهزة التوجيه بشكل صحيح، يجب جمع المعلومات التالية:
privacy_policy_note_2 = <b>إصدار IMEI وSN وإصدار البرنامج لجهاز التوجيه</b>.
privacy_policy_note_3 = يمكنك اختيار تنزيل الإصدار الأخير وإجراء التحديث من أجل التغلب على المخاطر المحتملة التي قد يتعرض لها النظام. في هذه الأثناء، يمكنك اختيار تشغيل ميزة التحديث التلقائي من أجل التغلب على حالات الفشل الخطيرة التي قد يواجهها النظام وتحديث تصحيح الأمان. يتم تمكين هذه الميزة بشكل افتراضي. لتعطيل هذه الميزة، يُرجى الانتقال إلى الإعدادات المتقدمة > التحديث على صفحة الإدارة المستندة إلى الويب لتعيينها. إلى جانب ذلك، سوف يستهلك تحديث الإصدار بيانات الخلوي.
privacy_policy_tro69_note_1 = من أجل السماح لك باستخدام CWMP ( بروتوكول الإنترنت ) عن بعد لإدارة جهاز النطاق العريض المحمول الخاص بك ، المشغل سوف جمع ومعالجة بعض المعلومات الشخصية الخاصة بك . يتم التحكم في المعلومات الخاصة بك ومعالجتها من قبل المشغل ، في حين أن " زد تي إي " يوفر فقط المتنقلة ذات النطاق العريض الأجهزة .
privacy_policy_tro69_note_2 = لمزيد من المعلومات حول المعلومات الشخصية الخاصة بك ، أو أي أسئلة حول حقوقك ككيان بيانات أو معالجة البيانات الشخصية الخاصة بك من خلال المشغل ، اتصل المشغل .
privacy_policy_url = عندما تضغط على "قبول"، فأنت تقر بأنك فهمت الشروط المذكورة أعلاه وتوافق عليها. لمعرفة المزيد حول حماية الخصوصية، يُرجى قراءة <a href="https://www.ztedevices.com/en/Privacy-Policy/ZTESmartRouterPrivacyPolicy" target="_blank" >سياسة خصوصية ZTE</a>.
