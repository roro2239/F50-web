dhcp_lease_time_note = وقت التأجير هذا مخصص فقط للجهاز (جهاز التوجيه/الكمبيوتر الشخصي/الكمبيوتر المحمول) الذي يتصل بجهاز التوجيه هذا مباشرة. يجب أن يبدأ الجهاز المتصل مباشرة طلب DHCP مرةً أخرى قبل انتهاء وقت التأجير. لذلك يوصى بعدم تغيير هذا الوقت إلى قيمة صغيرة جدًا. وهذه وظيفة مهنية للغاية، لذا يُرجى عدم تعديلها بسهولة.
