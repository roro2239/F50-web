faq_index_indicator_title = ما هو تعريف ضوء المؤشر؟
faq_index_mesh_problem_step_1 = 1. هل فشلت في تكوين شبكة متداخلة؟
faq_index_mesh_problem_step_1_explain = لتكوين شبكة متداخلة بنجاح، يُرجى التأكد من استيفاء الشروط التالية:<br/>1) يجب ألا يكون الجهازان بعيدين عن بعضهما (من متر إلى 3 أمتار). بعد إنشاء شبكة WiFi المتداخلة، ضع الجهاز في مكان مناسب في المنزل. إذا كان الجهاز الفرعي بعيدًا جدًا عن الجهاز الرئيسي، فسيتدهور أداء الشبكة المتداخلة المنزلية.<br/>2) يجب عدم تعيين الجهاز الجديد المستخدم كجهاز فرعي (تطبيق إعدادات المصنع الافتراضية فقط). إذا تم تعيين الجهاز، فيرجى إعادة تعيينه إلى إعدادات المصنع الافتراضية قبل تكوين شبكة متداخلة.<br/>3) اضغط على الزر WPS الخاص بكل جهاز مع وميض مصباح المؤشر.
faq_index_mesh_problem_step_2 = 2. كم يستغرق تكوين الشبكة المتداخلة؟ كيف أعرف أن الشبكة المتداخلة تم تكوينها بنجاح؟
faq_index_mesh_problem_step_2_explain = قد يستغرق الأمر من دقيقتين إلى 3 دقائق، وأثناء ذلك يستمر مصباح مؤشر الجهاز في الوميض باللون الأبيض. عندما يكون الجهاز في شبكة متداخلة، سيضيء مصباح مؤشر الشبكة الخاص به بطريقة عادية؛ يمكنك أيضًا عرض أجهزة الشبكة المتداخلة في عرض <a href="#mesh_building">طريقة عرض مخطط الشبكة</a> على الشاشة المقابلة.
faq_index_mesh_problem_step_3 = 3. هل يوجد اثنان من أجهزة الشبكة المتداخلة بعيدان عن بعضهما؟
faq_index_mesh_problem_step_3_explain = جرّب أيًا من الطرق التالية:<br/>1) أضف المزيد من الأجهزة المتداخلة لتكوين شبكة متداخلة (تحتاج إلى شراء أجهزة إضافية).<br/>2) في حالة عدم وجود أجهزة أخرى في الشبكة المتداخلة، فيمكنك استخدام كابل شبكة لتوصيل منفذ LAN الخاص بجهاز الشبكة الرئيسي وأي منفذ شبكة للجهاز الفرعي لضمان نقل البيانات بشكل مستقر بين الجهازين.
faq_index_mesh_problem_step_4 = 4. ما الذي يجب أن نفعله في الحالات التالية بعد نجاح عملية توصيل الشبكة؟
faq_index_mesh_problem_step_4_explain = 1) بعد تكوين الشبكة المتداخلة، إذا كانت المسافة بين جهازين قريبة جدًا، فقد يتداخلان مع بعضهما. في هذه الحالة، ضع الجهاز الفرعي على بعد متر واحد على الأقل من الجهاز الرئيسي.<br/>2) بعد تكوين الشبكة المتداخلة، إذا كان الجهاز الفرعي خارج الشبكة المتداخلة، فلن يمكنك الوصول إلى الشبكة. لاستخدام الجهاز، يُرجى إضافته إلى الشبكة المتداخلة الحالية مرةً أخرى أو إعادة تعيينه إلى إعدادات المصنع الافتراضية ثم تكوين شبكة متداخلة أخرى.<br/>3) مع تكوين شبكة متداخلة، تشترك الأجهزة في الشبكة المتداخلة في نفس معلمات Wi-Fi، وسوف تتصل أجهزة Wi-Fi في منزلك بجهاز شبكة متداخلة قريب. إذا حدث عطل في الجهاز الفرعي وتحول مصباح المؤشر الخاص به إلى اللون الأحمر، فلن يكون Wi-Fi الخاص بالجهاز الفرعي متاحًا، وستتصل أجهزة Wi-Fi في منزلك بجهاز قريب آخر ضمن الشبكة المتداخلة. يُنصح بإصلاح مشكلة اتصال Wi-Fi للجهاز الفرعي والتي تؤثر على تجربة استخدام Wi-Fi المنزلية. تحقق من شبكتك في الخطوات التالية:<br/>1. تحقق من اتصال كابل شبكة الموجه.<br/>2. تحقق من معلمات شبكة الجهاز في <a href="#internet_setting">إعدادات الاتصالات</a>.
