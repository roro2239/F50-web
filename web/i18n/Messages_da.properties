faq_index_indicator_title = Hvad definerer indikatorlampen?
faq_index_mesh_problem_step_1 = 1. Kunne ikke danne et mesh-netværk?
faq_index_mesh_problem_step_1_explain = For at danne mesh-netværk skal du sørge for at opfylde følgende betingelser:<br/>1) To enheder må ikke være for langt væk fra hinanden (en til tre meter). Efter oprettelse af wi-fi-mesh-netværket skal enheden placeres et godt sted i hjemmet. Tjek <a href="#mesh_device_list">Mine mesh-enheder</a> for at se mesh-netværket. Hvis underenheden er for langt væk fra hovedenheden, forringes hjemmets mesh-netværks ydeevne.<br/>2) Den nye enhed, der bruges som underenhed, må ikke indstilles (gælder kun fabriksstandarder). Hvis enheden er indstillet, skal du nulstille den til fabriksindstillingerne, før du danner mesh-netværk.<br/>3) Tryk på hver enheds WPS-knap, og indikatorlamperne blinker.
faq_index_mesh_problem_step_2 = 2. Hvor lang tid tager det at danne et mesh-netværk? Hvordan ved jeg, at et mesh-netværk er dannet?
faq_index_mesh_problem_step_2_explain = Det kan tage to til tre minutter, hvor enhedens indikatorlampe bliver ved med at blinke hvidt. Når enheden er i mesh-netværk, lyser dens netværksindikatorlys på normal vis. Du kan også se mesh-enheder i <a href="#mesh_building">topologivisning</a> på den tilsvarende skærm.
faq_index_mesh_problem_step_3 = 3. Er to mesh-enheder langt fra hinanden?
faq_index_mesh_problem_step_3_explain = Prøv en af følgende metoder:<br/>1) Tilføj flere mesh-enheder for at danne mesh-netværk (du skal købe ekstra enheder).<br/>2) Hvis der ikke er flere enheder i mesh-netværket, kan du bruge et netværkskabel til at tilslutte LAN-porten på hovedmesh-enheden og enhver netværksport på underenheden for at sikre stabil dataoverførsel mellem de to enheder.
faq_index_mesh_problem_step_4 = 4. Hvad skal vi gøre i følgende tilfælde, når netværket er vellykket?
faq_index_mesh_problem_step_4_explain = 1) Når mesh-netværk er dannet, kan de forstyrre hinanden, hvis afstanden mellem to enheder er for tæt. I dette tilfælde skal underenheden placeres mindst én meter væk fra hovedenheden.<br/>2) Når mesh-netværket er dannet, kan du ikke få adgang til netværket, hvis underenheden er uden for mesh-netværket. For at bruge enheden skal du tilføje den til det eksisterende mesh-netværk igen eller nulstille den til fabriksindstillingerne og derefter danne et andet mesh-netværk.<br/>3) Når mesh-netværket er dannet, deler enheder i mesh-netværket de samme wi-fi-parametre, og wi-fi-enheder i dit hjem opretter forbindelse til en mesh-enhed i nærheden. Hvis der opstår fejl i underenheden, og indikatorlampen bliver rød, vil underenhedens wi-fi ikke være tilgængelig, og wi-fi-enheder i dit hjem vil oprette forbindelse til en anden tilgængelig mesh-enhed i nærheden. Det anbefales at underenhedens wi-fi-forbindelsesproblem løses af en professionel, da det påvirker dit hjemme-wi-fi. = Kontrollér dit netværk med følgende trin:<br/>1. Kontrollér routerens netværkskabelforbindelse.<br/>2. Kontrollér enhedens netværksparametre i <a href="#internet_setting">Forbindelsesindstillinger </a>.
