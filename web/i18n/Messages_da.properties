ztelink_how_to_manage_odu = Sådan bruger du appen til at administrere ZTE-udendørsroutere
ztelink_link_scan_title = Scan for at downloade ZTELink
ztelink_manage_odu_has_bluetooth = For en enhed, der har Bluetooth-kapacitet (såsom MC7010, MC889), kan du forbinde den ved hjælp af appen Installer hjælper, som vil guide dig gennem processen med at opbygge en forbindelse.
ztelink_manage_odu_has_idu1 = Hvis du vil bruge ZTELink-appen til at administrere ZTE-udendørsrouter via den indendørs routers wi-fi, skal du:
ztelink_manage_odu_has_idu2 = 1. Tilslut udendørsrouter til indendørsrouter, der har wi-fi-kapacitet (normalt opretter udendørsrouteren forbindelse til en router i huset, så indendørsenheder kan oprette forbindelse).
ztelink_manage_odu_has_idu3 = 2. Hvis ZTELink-appen er installeret på telefonen, skal du tilslutte telefonen til indendørsrouterens wi-fi.
ztelink_manage_odu_has_idu4 = 3. Åbn ZTELink-appen for at oprette forbindelse til udendørsrouteren.
ztelink_manage_odu_no_bluetooth = For en enhed, der ikke har Bluetooth-funktion (f.eks. MF266, MF268), skal du oprette forbindelse til indendørsrouterens wi-fi ved hjælp af appen Installer hjælper, som vil guide dig gennem processen med at opbygge en forbindelse.
ztelink_scan_info = Du kan scanne QR-koden for at installere appen for at fjernadministrere din enhed.

mlo_switch = MLO
mlo_info = Hvis den er slået til, bruger enheden MLO multi-link-forbindelse, og Wi-Fi 7-adgangsenheden vælger uafhængigt samtidig frekvensbåndsadgang for at øge hastigheden og reducere ventetiden.
band_steering_and_mlo_info = Hvis Single SSID eller MLO er slået til, fungerer enhedens frekvenser stadig samtidig, og et Wi-Fi-netværksnavn kombineres og vises. Hvis Single SSID og MLO er slået fra, skal du angive Wi-Fi-netværksnavnet for hvert frekvensbånd separat.
mlo_security_mode_warn = For MLO-netværkssikkerhed skal du bruge krypterede sikkerhedsmetoder og angive en adgangskode til 2,4 GHz-netværket.
mlo_security_mode_warn_ex = For MLO-netværkssikkerhed skal du bruge krypteret sikkerhedstilstand og angive en adgangskode til netværket.
mlo_open_info = Enheden vil bruge de 2,4 GHz netværksparametre, der er indstillet, og netværkstilstanden vil blive ændret til 802.11 be. Du bliver nødt til at genoprette forbindelsen til de Wi-Fi enheder, der var tilsluttet det øvrige Wi-Fi frekvensbånd. Fortsætte?
mlo_open_info_owe =Enheden vil bruge de 2,4 GHz netværksparametre, der er indstillet, og netværkstilstanden vil blive ændret til 802.11 be. Sikkerhedstilstand (6GHz) vil blive ændret til WPA3-SAE (SAE). Du skal tilslutte de Wi-Fi-enheder, der var oprettet forbindelse til de andre Wi-Fi-frekvensbånd igen. Fortsæt
mlo_wifi5_on_info = Wi-Fi 7 MLO er slået til. Hvis du vil slå Wi-Fi 5 kompatibilitetstilstand til, skal du slå MLO fra.
mlo_no_be_info = Wi-Fi7-funktionen MLO er slået til, og kun 802.11BE kan bruges.
mlo_off_info = For netværkskompatibilitet ændres netværkstilstanden på 2,4 GHz og 5 GHz til 802.11 ax, og alle tilsluttede enheder opretter forbindelse igen efter Wi-Fi genstart. Fortsætte?
band_steering_intro_info_new = Hvis den er slået til, vælges den optimale frekvensadgang automatisk under adgangen.

