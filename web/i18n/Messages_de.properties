watch_dog = Watchdog
watch_dog_info = Sie können einen Domainnamen oder eine IP-Adresse eingeben und das Gerät pingt diese Adresse dann im Zeitintervall. Wenn der Ping im Schwellenwert für Neustarts fehlschlägt, wird das Gerät automatisch neu gestartet. Da das Netzwerk anormal ist, versucht das Gerät dreimal, sich wiederherzustellen. Wenn selbst das fehlschlägt, wird der nächste Ping 2 Stunden später durchgeführt.
watch_dog_loading = Der Parameter übermittelt und überprüft, ob die URL/IP-Adresse erreichbar ist.
watch_dog_not_support_ipv6 = Die Watchdog-Funktion wirkt sich nicht auf "reine IPv6"-Netzwerke aus.
watch_dog_note = Bitte beachten Sie, dass Sie diese Funktion verwenden und einen geeigneten Wert festlegen. Stellen Sie sicher, dass der Domainadressensatz gültig ist. Eine ungültige Domainadresse kann dazu führen, dass das Gerät ungeplant neu gestartet wird.
watch_dog_note_interval_time = Das Gerät versucht, dreimal gemäß dem Zeitintervall zu pingen. Wenn es fehlschlägt, versucht das Gerät es nach 2 Stunden erneut.
watch_dog_note_ipv6 = Die Watchdog-Funktion wirkt sich nicht auf "reine IPv6"-Netzwerke aus.
watch_dog_reboot_too_much_warning = Wenn IP/URL nicht erreichbar ist und das Gerät häufig mehr als 5-mal neu gestartet wird, wird Watchdog deaktiviert. Er muss vom Geräteadministrator manuell neu gestartet werden.
watch_dog_setting = Watchdog-Einstellungen
watch_dog_setting_fail = Pingen der von Ihnen festgelegten Adresse fehlgeschlagen. Bitte überprüfen Sie, ob das aktuelle Netzwerk normal ist, und stellen Sie sicher, dass diese Adresse gepingt werden kann. Andernfalls wird das Gerät kontinuierlich neu gestartet.
