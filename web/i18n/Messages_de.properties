wifi_info = WLAN Info
wifi_init_resart_info = <b/>Herzlichen Glückwunsch! Ihr Gerät ist eingerichtet!</b><br/><br/>WLAN wird neu gestartet, bitte warten ...<br/>Für den WLAN-Zugang müssen Sie sich erneut verbinden.
wifi_is_off = WLAN-Verbindung ist aus!
wifi_isolated_desc = Vollständig isoliert
wifi_main_ssid = Haupt-SSID
wifi_main_sub_title = Richten Sie den WLAN-Hotspot so ein, dass Ihr Mobiltelefon oder Ihr Notebook darüber auf das Netzwerk zugreifen kann.
wifi_move_fail = Die Synchronisierung ist fehlgeschlagen und kann durch die folgenden Bedingungen verursacht werden:<br/>1. Der WLAN-Sicherheitsmodus des alten Geräts ist WPA3 oder WPA2/WPA3.<br/>2. Das WLAN des alten Geräts ist OFFEN oder der Netzwerkname bzw. die Kennwortzeichen sind zu lang.<br/>3. Sie haben die WPS-Taste des alten Geräts und die WPS-Taste des neuen Geräts nicht innerhalb von 2 Minuten gedrückt.<br/>4. WLAN wird von der Umgebung beeinflusst.
wifi_move_info = Synchronisieren Sie den 2.4GHz-WLAN-Namen und das Kennwort des alten Geräts mit dem neuen Gerät.
wifi_move_password_empty = Das Netzwerkkennwort des alten Geräts ist leer, bitte geben Sie das Netzwerkkennwort ein.
wifi_move_success = Verschieben ist erfolgreich; bitte schalten Sie das alte Gerät aus, um eine Verbindung mit dem alten Netzwerk zu vermeiden.
wifi_move_tips = Tipps:<br/>1. Nur der Name und das Kennwort des 2.4GHz-WLANs können synchronisiert werden.<br/>2. Das Synchronisieren der WLAN-Parameter dauert einige Minuten und kann aufgrund eines inkompatiblen Problems mit dem alten Gerät fehlschlagen.<br/>3. Drücken Sie die WPS-Taste auf dem alten Gerät, und klicken Sie dann auf "Mit dem Sychronisieren beginnen".
wifi_move_title = Sychronisieren der WLAN-Einstellungen
wifi_move_wait = Sychronisieren …<br/>Bitte vergewissern Sie sich, dass WPS auf dem alten Gerät aktiviert ist.<br/>(Dies kann 1 bis 2 Minuten dauern.)
wifi_noneed_optimization = Der aktuelle Kanal ist sehr gut; keine Optimierung erforderlich.
wifi_not_ready = Sie können nicht arbeiten, wenn WLAN nicht bereit ist.
wifi_num = Anzahl der Benutzer:
wifi_off_alert = Sie müssen das Gerät an den PC anschließen und sich bei der Web-Benutzeroberfläche anmelden, um WLAN neu zu öffnen. Fortfahren?
wifi_off_alert_with_mesh = Das Mesh-Netzwerk wurde bereitgestellt und das Deaktivieren des WLAN bedeutet, dass auch das Mesh-Netzwerk deaktiviert ist. Sie müssen Ihr Gerät mit dem PC verbinden und sich in der WebUI anmelden, um das WLAN erneut zu öffnen. Fortfahren?
wifi_opti_auto_disable = Der aktuelle Kanal wird jetzt manuell definiert. Die Auto-Scan-Funktion wird deaktiviert.
wifi_opti_cant_opti = Wenn Sie einen Kanal manuell auf der Seite mit den SSID-Haupteinstellungen ausgewählt haben, können Sie die Optimieren-Funktion nicht verwenden. Bitte ändern Sie die Einstellungen des Haupt-SSID-Kanals auf Automatisch, um die Optimierungsfunktion verwenden zu können.
wifi_opti_cant_select_ch = Sie haben auf der Haupt-SSID-Einstellungsseite einen festen Kanal gewählt. Sie können hier in der WLAN-Optimierung keinen festen Kanal auswählen, wenn sich die SSID-Haupteinstellungen im manuellen Modus befinden.
wifi_opti_note_channel_list = Kanalliste: Listet alle Kanäle nach dem Scan auf, und wenn der Benutzer auf die Kanalleiste klickt, wird die Zeile erweitert und zeigt alle Hotspots auf diesem Kanal an.
wifi_opti_note_interference_tips = Das Farbfeld: zeigt den Kanalstörungsstatus an.
wifi_opti_note_mild_interference = Guter Kanal bedeutet, dass es auf diesem Kanal wenig Störungen gibt.
wifi_opti_note_mod_interference = Schlechter Kanal bedeutet, dass es auf diesem Kanal größere Störungen gibt, und wenn sich der aktuelle Kanal des Geräts auf diesem befindet, schlagen Sie dem Benutzer vor, das Netzwerk zu optimieren.
wifi_opti_note_no_interference = Perfekter Kanal bedeutet, dass es auf diesem Kanal keine Störungen gibt.
wifi_opti_note_scan_channel = WLAN-Kanal scannen: Das Gerät scannt den aktuellen Kanal, wenn der Benutzer auf diese Schaltfläche klickt.
wifi_opti_note_ser_interference = Schrecklicher Kanal bedeutet, dass es auf diesem Kanal sehr viele Störungen gibt. Wenn der aktuelle Kanal des Geräts auf diesem liegt, schlagen Sie dem Benutzer vor, das Netzwerk zu optimieren.
wifi_opti_note_set_channel = WLAN-Optimierung: Das Gerät optimiert den WLAN-Kanal und bleibt dann auf einem freieren Kanal.
wifi_opti_select_ch_tips = Der ausgewählte Kanal läuft nach 1 Stunde ab oder bis Sie auf die Schaltfläche „Optimierung“ klicken. WLAN funktioniert während der Optimierung nicht.<br/>Möchten Sie fortfahren?
wifi_opti_single_ssid_info = Wenn eine einzelne SSID aktiviert ist, wird nur der WLAN-Name (SSID) zusammengeführt, und die WLAN-Kanaloptimierung für 2.4GHz-Frequenzband bzw. 5GHz-Frequenzband wird weiterhin wirksam.
wifi_optimization = WLAN-Optimierung
wifi_password_check = Bitte geben Sie ein gültiges Kennwort ein. Der Kennwort enthält 0-9 a-z A-Z ! # $ * + , - . % : = ? @ [ ] ^ _ { | } ~ ( ) / und Raum, und es kann nicht mit Raum beginnen und enden.
wifi_qrcode = QR-Code
wifi_qrcode_scan_title = Scannen Sie den Code, um schnell eine <br/>Verbindung aufzubauen.
wifi_range = WLAN Reichweite
wifi_range_note = Eine kurze Reichweite der WLAN Reichweite reduziert den Stromverbrauch bis zu einem gewissen Grad, was die WLAN Reichweite in Ihrem Haus beeinträchtigen kann.
wifi_range_note_long = Hohe WLAN Reichweite: Maximale Emissionsleistung und Abdeckung, wenn das Endgerät noch eine Verbindung zu Ihrem WLAN-Netzwerk herstellt, was die Akkulaufzeit verringert.
