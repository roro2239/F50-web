nfc_settings_info = Wenn Sie NFC auf Ihrem Telefon aktivieren, berühren Sie den NFC-Bereich des Geräts, um eine Verbindung zum WLAN des Geräts herzustellen, ohne ein Kennwort einzugeben.</br> Hinweis: Es ist nur für Android-Geräte verfügbar.
nfc_switch_info = Wenn der NFC-Switch aktiviert ist, werden die von Ihnen eingestellten WLAN-Parameter in NFC geschrieben. Wenn er deaktiviert ist, werden die WLAN-Parameter gelöscht. </br>Diese NFC-Touch-Funktion wird deaktiviert.
