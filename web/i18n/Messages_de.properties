nfc_function_intro = NFC (Near Field Communication) ist ein internationaler Übertragungsstandard für den kontaktlosen Datenaustausch über kurze Distanzen von wenigen Zentimetern. Wenn Sie die NFC-Funktion dieses Routers aktivieren, können Sie eine beliebige WLAN-SSID angeben, mit der sich Mobilgeräte, die die NFC-Funktion unterstützen, mit dieser WLAN-SSID verbinden können, ohne das WLAN-Kennwort eingeben zu müssen. Sie können beispielsweise Gästen ermöglichen, sich einfach mit ihrem Gast-WLAN zu verbinden.
