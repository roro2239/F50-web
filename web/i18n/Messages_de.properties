key_log_setting_note_5 = <a id = "key_log_url" href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >Datenschutzerklärung des ZTE Smart Router Kundendienst-Verbesserungsplans</a>.
key_log_setting_note_6 = Um bessere Dienstleistungen und Erfahrung zu bieten, empfehlen wir Ihnen, diesem After-Sales-Verbesserungsplan beizutreten.
key_log_switch_note_1 = Um die möglichen Probleme Ihres Routers besser zu lokalisieren und seinen normalen sowie stabilen Betrieb zu gewährleisten, sammeln und speichern wir die folgenden ausgewählten Key Log Informationen Ihres Gerätes:Informationen zu dem Aktivieren und Deaktivieren der WLAN Funktion, abnormales WLAN Verhalten, erfolgreiche Netzwerkregistrierung, Signalstärke, Wechseln der Netzwerkstypen, Verbindungsabbrüche, PDP Verbindung und Trennung, Zelle Handover, Geräteneustart, FOTA Software Update Start und Ende, Einstecken des Netzwerkkabels.<br/>Bei Aktivierung dieser Funktion werden die oben angeführten Informationen gesammelt und auf diesem Gerät für ca. 1 Monat gespeichert. Sollte Ihr Gerät zur Reparatur eingeschickt werden, kann der After Sales Service von ZTE Österreich auf diese Daten zugreifen und zur Problemlösung auswerten. Fallweise können diese Daten auch zur weiteren Analyse an ZTE China übermittelt werden. Sobald ein etwaiges Problem mit dem Gerät gelöst werden konnte, werden sämtlich solcherart gespeicherten Daten unter Einhaltung der ZTE Datenschutzrichtlinie gelöscht.
key_log_switch_note_2 = Für weitere Details zum Thema Datenschutz lesen Sie bitte die <a href="https://ztedevices.com/en-gl/legal/zte-smart-router-after-sales-improvement-plan-privacy" target="_blank" >ZTE Smart Router After-Sales Improvement Plan Datenschutzerklärung</a><br/>Um einen besseren Service und eine bessere Erfahrung zu bieten, empfehlen wir Ihnen, an diesem After-Sales Verbesserungsplan teilzunehmen.
