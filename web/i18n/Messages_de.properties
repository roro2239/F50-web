ztelink_how_to_manage_odu = So verwenden Sie die App zur Verwaltung von ZTE Außen-Routern
ztelink_link_scan_title = Scannen, um ZTELink herunterzuladen
ztelink_manage_odu_has_bluetooth = Bei einem Bluetooth-fähigen Gerät (z. B. MC7010, MC889) können Sie eine Verbindung herstellen, indem Sie die Install Helper-App verwenden, die Sie durch den Vorgang des Verbindungsaufbaus führt.
ztelink_manage_odu_has_idu1 = Wenn Sie die ZTELink App verwenden möchten, um den ZTE Außen-Router über das WLAN des Innen-Routers zu verwalten, müssen Sie wie folgt vorgehen:
ztelink_manage_odu_has_idu2 = 1. Verbinden Sie den Außen-Router mit einem WLAN-fähigen Innen-Router (in der Regel wird der Außen-Router mit einem Router im Haus verbunden, damit die Innengeräte eine Verbindung herstellen können).
ztelink_manage_odu_has_idu3 = 2. Wenn die ZTELink App auf dem Handy installiert ist, verbinden Sie das Handy mit dem WLAN des Innen-Routers.
ztelink_manage_odu_has_idu4 = 3. Öffnen Sie die ZTELink App, um sich mit dem Außen-Router zu verbinden.
ztelink_manage_odu_no_bluetooth = Bei einem Gerät ohne Bluetooth-Fähigkeit (z. B. MF266, MF268) müssen Sie mithilfe der Install Helper-App eine Verbindung zum WLAN des Innen-Routers herstellen, die Sie durch den Vorgang des Verbindungsaufbaus führt.
ztelink_scan_info = Sie können den QR-Code scannen, um die App zu installieren und eine Remote-Verwaltung des Geräts zu ermöglichen.

mlo_switch = MLO
mlo_info = Wenn das Gerät eingeschaltet ist, verwendet das Gerät MLO-Multilink-Verbindung, und das WLAN-7-Zugriffsgerät wählt unabhängig voneinander den gleichzeitigen Frequenzbandzugriff aus, um die Rate zu erhöhen und die Latenz zu reduzieren.
band_steering_and_mlo_info = Wenn Single SSID oder MLO aktiviert ist, arbeiten die Frequenzen des Geräts weiterhin gleichzeitig und ein WLAN-Netzwerkname wird kombiniert und angezeigt. Wenn Single SSID und MLO deaktiviert sind, müssen Sie den WLAN-Netzwerknamen für jedes Frequenzband separat festlegen.
mlo_security_mode_warn = Für die MLO-Netzwerksicherheit verwenden Sie bitte verschlüsselte Sicherheitsmethoden und legen Sie ein Passwort für das 2,4GHz-Netzwerk fest.
mlo_security_mode_warn_ex = Für die MLO-Netzwerksicherheit verwenden Sie bitte den verschlüsselten Sicherheitsmodus und legen Sie ein Passwort für das Netzwerk fest.
mlo_open_info = Das Gerät verwendet die eingestellten 2.4GHz Netzwerkparameter und der Netzwerkmodus wird auf 802.11 geändert. Sie müssen die WLAN-Geräte, die mit dem anderen WLAN-Frequenzband verbunden waren, erneut verbinden. Weiter?
mlo_open_info_owe = Das Gerät verwendet die eingestellten 2.4GHz Netzwerkparameter, und der Netzwerkmodus wird auf 802.11 be geändert. Sicherheitsmodus (6GHz) wird auf WPA3-SAE (SAE) geändert. Sie müssen die WLAN-Geräte, die mit dem anderen WLAN-Frequenzband verbunden waren, erneut verbinden. Weiter?
mlo_wifi5_on_info = Wi-Fi 7 MLO wurde aktiviert. Wenn Sie den Wi-Fi 5-Kompatibilitätsmodus aktivieren möchten, deaktivieren Sie MLO.
mlo_no_be_info = Wi-Fi 7-Funktion MLO ist aktiviert und nur 802.11BE kann verwendet werden.
mlo_off_info = Aus Gründen der Netzwerkkompatibilität wird der 2,4GHz- und 5GHz-Netzwerkmodus auf 802.11 ax geändert, alle verbundenen Geräte verbinden sich nach einem Neustart des WLAN wieder. Weiter?
band_steering_intro_info_new = Wenn eingeschaltet, wird beim Zugriff automatisch der optimale Frequenzzugang ausgewählt.

