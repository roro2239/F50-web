faq_index_indicator_title = Was zeigt die Kontrollleuchte an?
faq_index_mesh_problem_step_1 = 1. Sie konnten kein Mesh-Netzwerk aufbauen?
faq_index_mesh_problem_step_1_explain = Um ein Mesh-Netzwerk erfolgreich aufzubauen, müssen folgende Bedingungen erfüllt sein:<br/>1) Zwei Geräte sollten nicht zu weit voneinander entfernt sein (1 bis 3 Meter). Nachdem Sie das WLAN-Mesh-Netzwerk erstellt haben, platzieren Sie das Gerät an einem geeigneten Ort im Haus. Wenn das Untergerät zu weit vom Hauptgerät entfernt ist, verschlechtert sich die Leistung des Home-Mesh-Netzwerks.<br/>2) Das neue Gerät, das als Untergerät verwendet wird, darf nicht eingestellt werden (verwendet nur die Werkseinstellungen). Sollte das Gerät bereits eingerichtet sein, setzen Sie es bitte auf die Werkseinstellungen zurück, bevor Sie ein Mesh-Netzwerk aufbauen.<br/>3) Drücken Sie die WPS-Taste jedes Geräts, woraufhin die Kontrollleuchte blinkt.
faq_index_mesh_problem_step_2 = 2. Wie lange dauert es, ein Mesh-Netzwerk aufzubauen? Woher weiß ich, dass ein Mesh-Netzwerk erfolgreich aufgebaut wurde?
faq_index_mesh_problem_step_2_explain = Es kann 2 bis 3 Minuten dauern, in denen die Kontrollleuchte des Geräts ständig blinkt. Wenn sich das Gerät im Mesh-Netzwerk befindet, leuchtet seine Netzwerkkontrollleuchte normal. Sie können Mesh-Geräte auch in der Topologieansicht auf dem entsprechenden Bildschirm anzeigen.
faq_index_mesh_problem_step_3 = 3. Zwei Mesh-Geräte sind weit voneinander entfernt?
faq_index_mesh_problem_step_3_explain = Probieren Sie Folgendes:<br/>1) Fügen Sie weitere Mesh-Geräte hinzu, um ein Mesh-Netzwerk aufzubauen (dazu müssen Sie zusätzliche Geräte kaufen).<br/>2) Wenn sich keine weiteren Geräte im Mesh-Netzwerk befinden, können Sie ein Netzwerkkabel verwenden, um den LAN-Port des Haupt-Mesh-Geräts und einen beliebigen Netzwerkport des Untergeräts anzuschließen, sodass eine stabile Datenübertragung zwischen den beiden Geräten gewährleistet ist.
faq_index_mesh_problem_step_4 = 4. Was sollte man in den folgenden Fällen tun, nachdem die Vernetzung erfolgreich war?
faq_index_mesh_problem_step_4_explain = 1) Wenn der Abstand zwischen zwei Geräten zu gering ist, können sie sich nach dem Aufbau des Mesh-Netzwerks gegenseitig stören. In diesem Fall das Untergerät mindestens einen Meter vom Hauptgerät entfernt platzieren.<br/>2) Nachdem das Mesh-Netzwerk aufgebaut wurde, können Sie nicht mehr auf das Netzwerk zugreifen, wenn sich das Untergerät außerhalb des Mesh-Netzwerks befindet. Um das Gerät zu verwenden, fügen Sie es bitte erneut zum bestehenden Mesh-Netzwerk hinzu oder setzen Sie es auf die Werkseinstellungen zurück und richten dann ein anderes Mesh-Netzwerk ein.<br/>3) Beim Aufbau eines Mesh-Netzwerks teilen sich die Geräte im Mesh-Netzwerk dieselben WLAN-Parameter, und die WLAN-Geräte bei Ihnen zu Hause verbinden sich mit einem Mesh-Gerät in ihrer Nähe. Wenn ein Untergerät ausfällt und seine Kontrollleuchte rot leuchtet, ist das WLAN des Untergeräts nicht verfügbar, und die WLAN-Geräte in Ihrem Haus verbinden sich mit einem anderen verfügbaren Mesh-Gerät in ihrer Nähe. Es ist ratsam, das WLAN-Verbindungsproblem von Untergeräten zu beheben, das die Nutzung Ihres Heim-WLANs beeinträchtigt. Überprüfen Sie Ihr Netzwerk anhand der folgenden Schritte:<br/>1. Überprüfen Sie die Netzwerkkabelverbindung des Routers.<br/>2. Überprüfen Sie die Netzwerkparameter des Geräts in den <a href=#mobile_network>Verbindungseinstellungen</a>.
