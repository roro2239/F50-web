wifi_greenap = Grünes WLAN
wifi_greenap_note = Wenn diese Funktion aktiviert ist, wird der Stromverbrauch gesenkt, wenn sich keine WLAN-Geräte mit Ihrem Gerät verbinden oder wenn sich WLAN-Geräte mit geringer Leistung mit Ihrem Gerät verbinden.
