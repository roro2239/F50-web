wifi_basic_note_network_name_input = Der Netzwerkname enthält 0-9 a-z A-Z ! # ( ) + - . / % = ? @ ^ _ { | } ~ und Raum, und es kann nicht mit Raum beginnen und enden.
wifi_basic_note_pass_phrase = Die gültigen Zeichen für das Passwort sind: 0-9 a-z A-Z#()+-/%=? @ ^_ {|}~
wifi_basic_note_max_station_number = Max. Anzahl der Stationen: Sie können die maximale Anzahl von drahtlosen Terminals auswählen, die eine Verbindung zum Gerät herstellen können.
