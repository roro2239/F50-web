privacy_policy_note_1 = Um Ihnen den System-Update-Service für Router bereitzustellen und sicherzustellen, dass Ihre Router-Geräte ordnungsgemäß funktionieren, müssen die folgenden Informationen gesammelt werden:
privacy_policy_note_2 = <b>IMEI, SN und Softwareversion des Router-Geräts</b>.
privacy_policy_note_3 = Sie können die neueste Version herunterladen und ein Update durchführen, um mögliche Risiken für das System zu beheben. In der Zwischenzeit können Sie die Funktion zur automatischen Aktualisierung aktivieren, um mögliche kritische Fehler des Systems zu beheben und den Sicherheitspatch zu aktualisieren. Diese Funktion ist standardmäßig aktiviert. Um diese Funktion zu deaktivieren, gehen Sie zu den erweiterten Einstellungen > Aktualisieren auf unserer webbasierten Verwaltungsseite, um sie festzulegen. Ferner werden bei der Aktualisierung der Version mobile Daten verbraucht.
privacy_policy_tro69_note_1 = Damit Sie das CWMP (ein Internetprotokoll) nutzen können, um Ihre mobilen Breitbandgeräte aus der Ferne zu verwalten, erfasst und verarbeitet der/die Betreiber:in einige Ihrer personenbezogenen Daten. Ihre Daten werden vom/von der Betreiber:in kontrolliert und verarbeitet, während ZTE nur das mobile Breitbandgerät bereitstellt.
privacy_policy_tro69_note_2 = Für weitere Informationen zu Ihren personenbezogenen Daten oder bei Fragen zu Ihren Rechten als betroffene Person bzw. zur Verarbeitung Ihrer personenbezogenen Daten durch den/die Betreiber:in, wenden Sie sich bitte an den/die Betreiber:in.
privacy_policy_url = Wenn Sie auf AKZEPTIEREN tippen, geben Sie an, dass Sie die oben genannten Bedingungen verstehen und diesen zustimmen. Um mehr über den Schutz der Privatsphäre zu erfahren, lesen Sie bitte die <a href=https://www.ztedevices.com/en/Privacy-Policy/ZTESmartRouterPrivacyPolicy target=_blank >ZTE-Datenschutzrichtlinie</a>.
