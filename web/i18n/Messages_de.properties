wifi_advanced_note_wifi6_mode = Wi-Fi 6: Wenn Ihre Geräte zu Hause nicht auf diesen Router zugreifen können, schalten Sie diese Funktion bitte aus. Wenn dies ausgeschaltet ist, schaltet der Router die Funktionen im Zusammenhang mit Wi-Fi 6 aus, um Kompatibilitätsprobleme zu vermeiden, wenn alte Geräte eine Verbindung zu Wi-Fi 6 herstellen.
