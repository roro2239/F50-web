    <script>
        function sendRequest(){
            var request = false;
        
            if(window.XMLHttpRequest) { 
                request = new XMLHttpRequest();
                if (request.overrideMimeType) {
                    request.overrideMimeType("text/xml");
                }
            }else if (window.ActiveXObject) {
                var MSXML = new Array('MSXML2.XMLHTTP','Microsoft.XMLHTTP','MSXML2.XMLHTTP.3.0','MSXML2.XMLHTTP.4.0','MSXML2.XMLHTTP5.0');
                for(var i=0;i<MSXML.length;i++){
                    try{
                        request = new ActiveXObject(MSXML[i]);
                        break;
                    }catch(e){
                        request = false;
                    }
                }
            }
            if (!request){
                loadCss("en");
            }else{
                //loadCss("ar");
                var url = "/goform/goform_get_cmd_process?cmd=Language&multi_data=1&isTest=false&_="+new Date().getTime();
                request.open("GET", url, true);
                request.onreadystatechange = function(){
                    if (request.readyState == 4) {
                        if (request.status == 200) {
                            var result = request.responseText;			
                            if(result.indexOf("ar")!=-1){
                                result="ar";
                            }else {
                                result="en";
                            }
                            loadCss(result);
                        } else {
                            loadCss("en");
                        }
                    }
                };
                request.send(null);
            }
        }
        function loadCss(currentLanguage){
            var cssTag = document.getElementById('loadCss');
            var css2Tag = document.getElementById('loadCss2');
            var css3Tag = document.getElementById('loadCss3');
            var head = document.getElementsByTagName('head').item(0);
            if(cssTag){
                cssTag.href = "./theme/"+(currentLanguage=="ar"?"bootstrap.rtl.css?v=1736213398713"+"?v="+new Date().getTime():"bootstrap.css?v=1736213398713"+"?v="+new Date().getTime());
                css2Tag.href = "./theme/"+(currentLanguage=="ar"?"app.ar.css?v=1736213398713"+"?v="+new Date().getTime():"app.css?v=1736213398713"+"?v="+new Date().getTime());
                css3Tag.href = "./theme/"+(currentLanguage=="ar"?"chosen_ar.css?v=1736213398713"+"?v="+new Date().getTime():"chosen.css?v=1736213398713"+"?v="+new Date().getTime());
                
                //head.removeChild(cssTag);
            }else{
                css = document.createElement('link');
                css.href = "./theme/"+(currentLanguage=="ar"?"bootstrap.rtl.css?v=1736213398713"+"?v="+new Date().getTime():"bootstrap.css?v=1736213398713"+"?v="+new Date().getTime());
                css.rel = 'stylesheet';
                css.type = 'text/css';
                css.id = 'loadCss';
                head.appendChild(css);
                css = document.createElement('link');
                css.href = "./theme/"+(currentLanguage=="ar"?"app.ar.css?v=1736213398713"+"?v="+new Date().getTime():"app.css?v=1736213398713"+"?v="+new Date().getTime());
                css.rel = 'stylesheet';
                css.type = 'text/css';
                css.id = 'loadCss2';
                head.appendChild(css);
                css = document.createElement('link');
                css.href = "./theme/"+(currentLanguage=="ar"?"chosen_ar.css?v=1736213398713"+"?v="+new Date().getTime():"chosen.css?v=1736213398713"+"?v="+new Date().getTime());
                css.rel = 'stylesheet';
                css.type = 'text/css';
                css.id = 'loadCss3';
                head.appendChild(css);		
            }
            if(currentLanguage=="ar"){		
                document.getElementsByTagName("html")[0].setAttribute("dir", "rtl");
            }else{
                document.getElementsByTagName("html")[0].setAttribute("dir", "ltr");

            }
        }
    
        
        </script>
