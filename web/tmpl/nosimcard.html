<div class="alert alert-danger alert-custom colorRed" role="alert" data-bind="visible: isChargingExpired() || batteryTemperatureLevel() != '0'">
    <div data-bind="visible: isChargingExpired" data-trans="battery_charging_expired"></div>
    <div data-bind="visible: batteryTemperatureLevel() == '1'" data-trans="battery_temperature_level_1"></div>
    <div data-bind="visible: batteryTemperatureLevel() == '2'" data-trans="battery_temperature_level_2"></div>
    <div data-bind="visible: batteryTemperatureLevel() == '3'" data-trans="battery_temperature_level_3"></div>
</div>
<div class="page-title">
    <img src="img/home_fill_black.png?v=1736213398713">
    <h1 data-trans="Home"></h1>
</div>
<div id="innerContainerNoSim">
    <div id="div-nosimcard"></div>
    <div class="table-container pt-4 pb-5" data-bind="visible:page()==pageState.NO_SIM">
        <div class="content mt-4 pt-3 pb-3">
            <div class="row mb-3 mt-3">
                <div class="col-12 text-center">
                    <div>
                        <img src="./img/img_insert_sim .png?v=1736213398713" />
                    </div>
                    <div class="mt-3">
                        <span class="no_rule" data-trans="connetion_setttings_info"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="limit-container pt-4 pb-5" data-bind="visible:page()!=pageState.NO_SIM">
        <div class="form-title" data-bind="visible:page()!=pageState.NO_SIM">
            <h6 data-trans="pin_management"></h6>
        </div>
        <form id="frmPIN" data-bind="visible:page()==pageState.WAIT_PIN">
            <div class="">
                <div class="content">
                    <div class="prompt">
                        <p data-trans="enter_pin"></p>
                        <p class="important-prompt" data-bind="visible:sim_pinnumber()>1">
                            <span data-trans="attempts_left"></span> <span data-bind='text:sim_pinnumber'></span>
                        </p>
                        <p class="important-prompt" data-bind="visible:sim_pinnumber()==1" data-trans="last_enter_pin"></p>
                    </div>
                    <div class="row">
                        <label class="col-1 col-form-label" for='txtPIN' data-trans='pin'></label>
    
                        <div class="col-10 col-md-6">
                            <input id='txtPIN' autocomplete="off" name="txtPIN" type="password" class="required form-control noSimInput"
                                    maxlength='8' data-bind="value:PIN, valueUpdate: 'keypress'"/>
                        </div>
                    </div>
                    <div class="form-buttons">
                        <input id="btnPinApply" class="btn btn-primary" type="submit" data-trans="apply"/>
                    </div>
                </div>
            </div>
        </form>
        <form id="frmPUK" data-bind="visible:page()==pageState.WAIT_PUK">
            <div class="">
                <div class="content">
                    <div class="prompt">
                        <p data-trans="enter_puk"></p>
    
                        <p class="important-prompt" data-bind="visible:pukNumber()>1">
                            <span data-trans="attempts_left"></span> <span data-bind='text:pukNumber'></span>
                        </p>
    
                        <p class="important-prompt" data-bind="visible:pukNumber()==1" data-trans="last_enter_puk"></p>
                    </div>
                    <div class="row mb-3">
                        <label class="col-12 col-md-3 col-form-label" for='txtPUK' data-trans='puk'></label>
    
                        <div class="col-12 col-md-6">
                            <input id='txtPUK' autocomplete="off" name="txtPUK" type="password" class="required form-control noSimInput"
                                    maxlength='8'
                                    data-bind="value:PUK, valueUpdate: 'afterkeydown'"/>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-12 col-md-3 col-form-label" for='txtNewPIN' data-trans='new_pin'></label>
    
                        <div class="col-12 col-md-6">
                            <input id='txtNewPIN' autocomplete="off" name="txtNewPIN" type="password" class="required form-control noSimInput"
                                    maxlength='8'
                                    data-bind="value:newPIN, valueUpdate: 'afterkeydown'"/>
                        </div>
                        <div class="clear"></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-12 col-md-3 col-form-label" for='txtConfirmPIN' data-trans='confirm_pin'></label>
    
                        <div class="col-12 col-md-6">
                            <input id='txtConfirmPIN' autocomplete="off" name="txtConfirmPIN" type="password"
                                    class="required form-control noSimInput"
                                    maxlength='8' data-bind="value:confirmPIN, valueUpdate: 'afterkeydown'"/>
                        </div>
                        <div class="clear"></div>
                    </div>
                    <div class="form-buttons">
                        <input id="btnPUKApply" class="btn btn-primary " type="submit" data-trans="apply"/>
                    </div>
                </div>
            </div>
        </form>
    </div>  
    <div class="content" data-bind="visible:page()==pageState.PUK_LOCKED">
            <div class="colorRed font18" data-trans="no_sim_card_message"></div>
     </div> 
</div>
