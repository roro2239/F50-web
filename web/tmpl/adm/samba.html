<div class="page-title">
    <img src="svg_img/system_black.svg">
    <h1 data-trans="samba_setting"></h1>
</div>
<div id="innerContainer">
    <div class="limit-container">
        <form id="sambaForm">
            <div class="content">
                <div class="row mb-3">
                    <label class="col-8 col-md-4 col-sm-6 side-right" data-trans="samba"></label>
                    <div class="col-3 form-switch">
                        <input class="form-check-input" type="checkbox" name="sambaSwitch" id="sambaSwitch"
                            data-bind="checked : sambaSwitch, click: setSambaSwitch" />
                    </div>
                </div>
                <div class="row help-info pb-3">
					<label style="display: inline" data-trans="samba_setting_tips" class="col-12 side-right"></label>					
				</div>
            </div>
            <div class="form-note">
                <div class="notes-title">&nbsp;</div>
                <ul class="notes-content">
                    <li data-trans="samba_setting_ex"></li>
                    <li class="no-style">
                        <ul>
                            <li data-trans="samba_setting_ex_windows"></li>
                            <li data-trans="samba_setting_ex_mac"></li>
                            <li data-trans="samba_setting_ex_android"></li>
                            <li data-trans="samba_setting_ex_ios"></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </form>
    </div>
</div>
