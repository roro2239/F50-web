<div class="page-title">
    <img src="svg_img/system_black.svg">
    <h1 data-trans="performance_mode"></h1>
</div>
<div id="innerContainer">
    <div class="limit-container">
        <form id="performanceModeForm">
            <div class="content">
                <div class="row mb-3">
                    <label class="col-8 col-md-4 col-sm-6 side-right" data-trans="performance_mode"></label>
                    <div class="col-3 form-switch">
                        <input class="form-check-input" type="checkbox" name="performanceMode" id="performanceMode"
                            data-bind="checked : performanceMode, click: setPerformanceMode" />
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
