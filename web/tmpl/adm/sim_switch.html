<div class="page-title">
    <img src="svg_img/system_black.svg">
    <h1 data-trans="sim_switch"></h1>
</div>
<div id="innerContainer">
    <div class="limit-container">
        <form id="simSwitchForm">
            <div class="content">
                <div class="row mb-3">
                    <label class="col-md-4" data-trans="sim_switch"></label>
                    <div class="col-md-3 col-12">
						<input type="radio" name="simSlotGrp" id="simSlot1" class="form-check-input" data-bind="checked: simSlot" value="0"/>
						<label class="form-check-label" for="simSlot1" data-trans="sim_switch_1"></label>
					</div>
					<div class="col-md-3 col-12">
						<input type="radio" name="simSlotGrp" id="simSlot2" class="form-check-input" data-bind="checked: simSlot" value="1"/>
						<label class="form-check-label" for="simSlot2" data-trans="sim_switch_2"></label>
					</div>
                </div>
                <div class="form-buttons">
                    <input type="submit" class="btn btn-primary" data-trans="apply" />
                </div>
            </div>
        </form>
    </div>
</div>
