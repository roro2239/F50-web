<div class="page-title">
    <img src="svg_img/system_black.svg">
    <h1 data-trans="usb_internet_protocol"></h1>
</div>
<div id="innerContainer">
    <div class="limit-container">
        <form id="usbProtocalForm">
            <div class="content">
                <div class="row mb-3">
                    <label class="col-md-4 col-form-label" data-trans="usb_internet_protocol"></label>
                    <div class="col-md-6 col-12">
                        <select id="usbInternetProtocol" class="form-control form-select" data-bind="value: usbProtocal">
                            <option value="0" data-trans="auto"></option>
                            <option value="1">RNDIS</option>
                            <option value="2">CDC-ECM</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="form-buttons">
                <input type="submit" class="btn btn-primary" data-trans="apply" />
            </div>
            <div class="form-note">
                <div class="notes-title">&nbsp;</div>
                <ul class="notes-content">
                    <li data-trans="usb_internet_protocol_info"></li>
                </ul>
            </div>
        </form>
    </div>
</div>
