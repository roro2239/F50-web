name: 构建并发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: 构建 Android arm64
    runs-on: ubuntu-latest

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定发布版本
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "${version}" | grep -Eq '^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$'; then
            echo "版本号格式错误: ${version}"
            echo "请使用类似 v1.0.0 的格式"
            exit 1
          fi

          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: 创建手动发布标签
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git rev-parse "${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "标签已存在: ${RELEASE_VERSION}"
          else
            git tag "${RELEASE_VERSION}"
            git push origin "${RELEASE_VERSION}"
          fi

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 安装 Android NDK
        run: |
          set -euo pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.14206865"

      - name: 构建 arm64 二进制
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
        run: |
          set -euo pipefail
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/29.0.14206865"
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          test -x "${CC}"
          mkdir -p dist
          go build -trimpath -o dist/f50-web-arm64 .
          cp scripts/f50-web-watchdog.sh dist/f50-web-watchdog.sh
          cp scripts/start-android.sh dist/start-android.sh
          cp scripts/stop-android.sh dist/stop-android.sh
          mkdir -p dist/f50-web-arm64-package/scripts
          cp dist/f50-web-arm64 dist/f50-web-arm64-package/f50-web-arm64
          cp scripts/f50-web-watchdog.sh dist/f50-web-arm64-package/scripts/f50-web-watchdog.sh
          cp scripts/start-android.sh dist/f50-web-arm64-package/scripts/start-android.sh
          cp scripts/stop-android.sh dist/f50-web-arm64-package/scripts/stop-android.sh
          (cd dist && zip -r f50-web-arm64-package.zip f50-web-arm64-package)

      - name: 生成更新日志
        run: |
          set -euo pipefail
          current_ref="${RELEASE_VERSION}"
          previous_tag="$(git describe --tags --abbrev=0 "${current_ref}^" 2>/dev/null || true)"

          {
            echo "## 更新日志"
            echo
            if [ -n "${previous_tag}" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${current_ref}"
            else
              git log --pretty=format:'- %s (%h)' "${current_ref}"
            fi
          } > release-notes.md

      - name: 发布 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_VERSION}" \
              dist/f50-web-arm64 \
              dist/f50-web-watchdog.sh \
              dist/start-android.sh \
              dist/stop-android.sh \
              dist/f50-web-arm64-package.zip \
              --clobber
            gh release edit "${RELEASE_VERSION}" --notes-file release-notes.md
          else
            gh release create "${RELEASE_VERSION}" \
              dist/f50-web-arm64 \
              dist/f50-web-watchdog.sh \
              dist/start-android.sh \
              dist/stop-android.sh \
              dist/f50-web-arm64-package.zip \
              --title "${RELEASE_VERSION}" \
              --notes-file release-notes.md
          fi
